<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ร้านค้า — Mayor Service</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Sarabun',sans-serif;background:#0f1923;color:#fff;min-height:100vh}
  nav{background:#1a2a3a;padding:14px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;border-bottom:1px solid #1e3a5f}
  .nav-logo{font-size:18px;font-weight:700;letter-spacing:1px}
  .nav-logo span{color:#f59e0b}
  .nav-right{display:flex;gap:10px;align-items:center}
  .nav-link{color:#9ca3af;text-decoration:none;font-size:14px;padding:6px 12px;border-radius:8px;transition:.2s}
  .nav-link:hover,.nav-link.active{color:#fff;background:#1e3a5f}
  .btn-sm{padding:7px 16px;background:#1d4ed8;color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer;transition:.2s}
  .btn-sm:hover{background:#1e40af}
  .hero{background:linear-gradient(135deg,#1a2a3a 0%,#0f2744 100%);padding:32px 20px 24px;border-bottom:1px solid #1e3a5f}
  .hero h1{font-size:26px;font-weight:700;margin-bottom:6px}
  .hero p{color:#9ca3af;font-size:14px}
  .cats{padding:16px 20px;display:flex;gap:8px;overflow-x:auto;border-bottom:1px solid #1e3a5f;scrollbar-width:none}
  .cats::-webkit-scrollbar{display:none}
  .cat-btn{padding:8px 18px;border-radius:20px;border:1.5px solid #374151;background:transparent;color:#9ca3af;cursor:pointer;white-space:nowrap;font-size:13px;transition:.2s}
  .cat-btn.active,.cat-btn:hover{border-color:#1d4ed8;color:#fff;background:#1d4ed8}
  .grid{padding:20px;display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px}
  .card{background:#1a2a3a;border-radius:14px;padding:16px;cursor:pointer;transition:.2s;border:1.5px solid transparent}
  .card:hover{border-color:#1d4ed8;transform:translateY(-2px)}
  .card-cat{font-size:11px;color:#6b7280;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
  .card-name{font-size:15px;font-weight:600;margin-bottom:8px}
  .card-price{font-size:20px;font-weight:700;color:#f59e0b}
  .card-price span{font-size:12px;color:#9ca3af;font-weight:400}
  .badge{display:inline-block;padding:3px 8px;border-radius:10px;font-size:11px;font-weight:600;margin-top:8px}
  .badge.in-stock{background:#052e16;color:#86efac}
  .badge.out{background:#450a0a;color:#fca5a5}
  .empty{text-align:center;color:#6b7280;padding:60px 20px;font-size:15px}
  .loading{text-align:center;color:#6b7280;padding:60px 20px}
  .spinner{width:32px;height:32px;border:3px solid #374151;border-top-color:#1d4ed8;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* Modal */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:flex-end;justify-content:center;z-index:200;padding:0}
  .overlay.hidden{display:none}
  .modal{background:#1a2a3a;border-radius:20px 20px 0 0;width:100%;max-width:480px;padding:24px 20px 40px;max-height:90vh;overflow-y:auto}
  .modal-handle{width:40px;height:4px;background:#374151;border-radius:2px;margin:0 auto 20px}
  .modal h2{font-size:18px;font-weight:700;margin-bottom:6px}
  .modal-price{font-size:28px;font-weight:700;color:#f59e0b;margin-bottom:16px}
  .modal-price span{font-size:14px;color:#9ca3af;font-weight:400}
  .stock-info{padding:10px 14px;background:#0f2744;border-radius:10px;font-size:13px;color:#60a5fa;margin-bottom:20px}
  .btn-buy{width:100%;padding:16px;background:#1d4ed8;color:#fff;border:none;border-radius:12px;font-size:17px;font-weight:700;cursor:pointer;transition:.2s}
  .btn-buy:hover{background:#1e40af}
  .btn-buy:disabled{background:#374151;cursor:not-allowed}
  .btn-close{width:100%;padding:12px;background:transparent;color:#9ca3af;border:1.5px solid #374151;border-radius:12px;font-size:15px;cursor:pointer;margin-top:10px;transition:.2s}
  .btn-close:hover{border-color:#6b7280;color:#fff}
  .msg{padding:10px 14px;border-radius:8px;font-size:13px;margin-top:12px;display:none}
  .msg.error{background:#450a0a;color:#fca5a5;display:block}
  .msg.success{background:#052e16;color:#86efac;display:block}
</style>
</head>
<body>

<nav>
  <div class="nav-logo">MAYOR <span>SERVICE</span></div>
  <div class="nav-right">
    <a href="/pages/shop.html" class="nav-link active">ร้านค้า</a>
    <a href="/pages/history.html" class="nav-link">ประวัติ</a>
    <button class="btn-sm" id="navBtn" onclick="handleNavBtn()">เข้าสู่ระบบ</button>
  </div>
</nav>

<div class="hero">
  <h1>ซื้อไอดี SimCity BuildIt</h1>
  <p>พร้อมเล่น ส่งรวดเร็ว ปลอดภัย 100%</p>
</div>

<div class="cats" id="catBar">
  <button class="cat-btn active" onclick="filterCat(null, this)">ทั้งหมด</button>
</div>

<div id="productGrid" class="grid">
  <div class="loading"><div class="spinner"></div>กำลังโหลดสินค้า...</div>
</div>

<!-- Product Modal -->
<div class="overlay hidden" id="overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div id="modalContent"></div>
  </div>
</div>

<script type="module">
import { shop, order } from '../js/core/api.js';
import { getProfile, logout } from '../js/core/auth.js';

let currentProfile = null;

// Nav
getProfile().then(p => {
  currentProfile = p;
  if (p) {
    document.getElementById('navBtn').textContent = 'ออกจากระบบ';
  }
});

window.handleNavBtn = () => {
  if (currentProfile) logout();
  else window.location.href = '/pages/login.html';
};

// Categories
shop.getCategories().then(res => {
  if (!res.success) return;
  const bar = document.getElementById('catBar');
  res.data.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn';
    btn.textContent = cat.name;
    btn.onclick = () => filterCat(cat.id, btn);
    bar.appendChild(btn);
  });
});

// Products
let allProducts = [];

async function loadProducts(categoryId = null) {
  document.getElementById('productGrid').innerHTML = '<div class="loading"><div class="spinner"></div>กำลังโหลดสินค้า...</div>';
  const res = await shop.getProducts(categoryId);
  if (!res.success) {
    document.getElementById('productGrid').innerHTML = '<div class="empty">เกิดข้อผิดพลาด: ' + res.error + '</div>';
    return;
  }
  allProducts = res.data;
  renderProducts(res.data);
}

function renderProducts(products) {
  const grid = document.getElementById('productGrid');
  if (products.length === 0) {
    grid.innerHTML = '<div class="empty">ไม่มีสินค้าในหมวดนี้</div>';
    return;
  }
  grid.innerHTML = products.map(p => `
    <div class="card" onclick="openProduct('${p.id}')">
      <div class="card-cat">${p.product_categories?.name || ''}</div>
      <div class="card-name">${p.name}</div>
      <div class="card-price">${Number(p.price).toLocaleString('th-TH')} <span>บาท</span></div>
      <span class="badge ${p.stock > 0 ? 'in-stock' : 'out'}">${p.stock > 0 ? `มีสินค้า ${p.stock} ชิ้น` : 'สินค้าหมด'}</span>
    </div>
  `).join('');
}

window.filterCat = (catId, btn) => {
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadProducts(catId);
};

// Modal
window.openProduct = (productId) => {
  const p = allProducts.find(x => x.id === productId);
  if (!p) return;
  document.getElementById('modalContent').innerHTML = `
    <h2>${p.name}</h2>
    <div class="modal-price">${Number(p.price).toLocaleString('th-TH')} <span>บาท</span></div>
    ${p.description ? `<p style="color:#9ca3af;font-size:14px;margin-bottom:12px">${p.description}</p>` : ''}
    <div class="stock-info">📦 สินค้าคงเหลือ: <strong>${p.stock} ชิ้น</strong></div>
    <button class="btn-buy" id="btnBuy" onclick="doBuy('${p.id}')" ${p.stock === 0 ? 'disabled' : ''}>
      ${p.stock === 0 ? 'สินค้าหมด' : 'สั่งซื้อเลย'}
    </button>
    <button class="btn-close" onclick="closeModal()">ยกเลิก</button>
    <div class="msg" id="modalMsg"></div>
  `;
  document.getElementById('overlay').classList.remove('hidden');
};

window.closeModal = (e) => {
  if (!e || e.target === document.getElementById('overlay')) {
    document.getElementById('overlay').classList.add('hidden');
  }
};

window.doBuy = async (productId) => {
  if (!currentProfile) {
    window.location.href = '/pages/login.html';
    return;
  }
  const btn = document.getElementById('btnBuy');
  const msg = document.getElementById('modalMsg');
  btn.disabled = true;
  btn.textContent = 'กำลังสั่งซื้อ...';
  msg.className = 'msg';

  const res = await order.create(productId);
  if (!res.success) {
    msg.textContent = res.error;
    msg.className = 'msg error';
    btn.disabled = false;
    btn.textContent = 'สั่งซื้อเลย';
    return;
  }
  window.location.href = '/pages/checkout.html?order=' + res.orderId;
};

loadProducts();
</script>
</body>
</html>
