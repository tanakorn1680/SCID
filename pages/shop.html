<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>สินค้าทั้งหมด</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

  :root{
    --paper:#FBF8F1; --navy:#1A6BA0; --sky:#2196C9;
    --gold:#D9A330; --gold-deep:#B9821F; --ink:#1A3A52;
    --line:rgba(26,106,160,0.18); --muted:rgba(26,58,82,0.55);
    --green-go:#3F8557; --danger:#E04433;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ background:#81CFF0; }

  body{
    font-family:'IBM Plex Sans Thai', sans-serif;
    color:var(--ink);
    min-height:100vh;
    padding-bottom:30px;
    -webkit-font-smoothing:antialiased;
  }

  /* ===== TOPBAR ===== */
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 16px;
  }
  .topbar img{ height:34px; }
  .nav-actions{ display:flex; gap:14px; align-items:center; font-size:13px; }
  .nav-actions a{ color:var(--navy); text-decoration:none; font-weight:600; }

  /* ===== HERO BANNER ===== */
  .hero-banner{
    margin:0 16px 18px;
    background:linear-gradient(135deg, #1A6BA0 0%, #0E4C7A 100%);
    border-radius:18px;
    padding:26px 22px;
    color:#fff;
    box-shadow:0 10px 28px rgba(0,40,80,0.28);
    position:relative;
    overflow:hidden;
  }
  .hero-title{
    font-family:'Baloo 2', sans-serif;
    font-size:20px;
    font-weight:800;
    margin-bottom:6px;
    position:relative; z-index:1;
  }
  .hero-sub{
    font-size:13px;
    color:rgba(255,255,255,0.85);
    position:relative; z-index:1;
  }
  .hero-banner::after{
    content:'';
    position:absolute;
    right:-30px; top:-30px;
    width:140px; height:140px;
    background:rgba(217,163,48,0.18);
    border-radius:50%;
  }

  /* ===== CATEGORY TABS ===== */
  .category-section{ padding:0 16px; margin-bottom:14px; }
  .category-label{
    font-size:12.5px; font-weight:700; color:var(--muted);
    margin-bottom:8px;
  }
  .category-tabs{
    display:flex; gap:8px; overflow-x:auto;
    padding-bottom:4px;
    scrollbar-width:none;
  }
  .category-tabs::-webkit-scrollbar{ display:none; }
  .cat-tab{
    flex-shrink:0; padding:8px 16px;
    background:rgba(255,255,255,0.85);
    border-radius:20px; font-size:13px; font-weight:600;
    border:1.5px solid var(--line);
    cursor:pointer; white-space:nowrap;
    transition:all .15s ease;
  }
  .cat-tab.active{ background:var(--navy); color:#fff; border-color:var(--navy); }

  .divider{
    height:1px; background:rgba(255,255,255,0.3);
    margin:0 16px 16px;
  }

  /* ===== PRODUCT GRID ===== */
  .product-grid{
    display:grid; grid-template-columns:repeat(2,1fr); gap:12px;
    padding:0 16px;
  }
  @media (min-width:640px){
    .product-grid{ grid-template-columns:repeat(3,1fr); }
  }
  @media (min-width:960px){
    .product-grid{ grid-template-columns:repeat(4,1fr); }
  }

  .product-card{
    background:rgba(255,255,255,0.97);
    border-radius:14px;
    overflow:hidden;
    box-shadow:0 4px 14px rgba(0,40,80,0.14);
    display:flex; flex-direction:column;
  }
  .product-img-wrap{
    width:100%; aspect-ratio:1;
    background:linear-gradient(135deg, #E8F2FA, #D4E9F7);
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
    position:relative;
  }
  .product-img-wrap img{
    width:100%; height:100%; object-fit:cover;
  }
  .stock-badge-overlay{
    position:absolute; top:8px; right:8px;
    font-size:10.5px; font-weight:700;
    padding:3px 8px; border-radius:10px;
  }
  .stock-badge-overlay.in-stock{
    background:rgba(63,133,87,0.92); color:#fff;
  }
  .stock-badge-overlay.out-of-stock{
    background:rgba(224,68,51,0.92); color:#fff;
  }

  .product-info{
    padding:10px 11px 12px;
    display:flex; flex-direction:column; flex:1;
  }
  .product-name{
    font-size:13.5px; font-weight:700;
    margin-bottom:4px;
    line-height:1.3;
  }
  .product-rating{
    font-size:12px; color:var(--gold-deep);
    margin-bottom:5px;
    letter-spacing:1px;
  }
  .product-price{
    font-family:'Baloo 2', sans-serif;
    font-weight:800; color:var(--gold);
    font-size:17px;
    margin-bottom:3px;
  }
  .product-stock-text{
    font-size:11px; color:var(--muted);
    margin-bottom:10px;
  }
  .product-stock-text.zero{ color:var(--danger); font-weight:600; }

  .detail-btn{
    margin-top:auto;
    width:100%; padding:9px 0;
    background:var(--navy); color:#fff;
    border:none; border-radius:9px;
    font-size:12.5px; font-weight:700;
    font-family:'Baloo 2', sans-serif;
    text-align:center; text-decoration:none;
    display:block;
  }

  .empty-state, .loading-state{
    grid-column:1 / -1;
    text-align:center; padding:50px 20px;
    color:rgba(255,255,255,0.75); font-size:14px;
  }
</style>
</head>
<body>

<div class="topbar">
  <img src="../images/logo-main-service1.png" alt="logo">
  <div class="nav-actions" id="navActions"></div>
</div>

<div class="hero-banner">
  <div class="hero-title">ซื้อไอดี SimCity BuildIt</div>
  <div class="hero-sub">พร้อมเล่น ส่งรวดเร็ว ปลอดภัย 100%</div>
</div>

<div class="category-section">
  <div class="category-label">หมวดหมู่</div>
  <div class="category-tabs" id="categoryTabs">
    <div class="cat-tab active" data-cat="">ทั้งหมด</div>
  </div>
</div>

<div class="divider"></div>

<div class="product-grid" id="productGrid">
  <div class="loading-state">กำลังโหลดสินค้า...</div>
</div>

<script type="module">
import { shop } from '../js/core/api.js';
import { getProfile, logout, setupSessionExpiryHandler } from '../js/core/auth.js';
setupSessionExpiryHandler();

// ───────── Render nav ตาม auth state ─────────
async function renderNav() {
  const profile = await getProfile();
  const navEl = document.getElementById('navActions');

  if (!profile) {
    navEl.innerHTML = `<a href="/pages/login.html">เข้าสู่ระบบ</a>`;
    return;
  }

  const adminLink = profile.role === 'admin'
    ? `<a href="/pages/admin/dashboard.html">แอดมิน</a>`
    : '';

  navEl.innerHTML = `
    ${adminLink}
    <a href="/pages/history.html">ประวัติ</a>
    <a href="#" id="logoutBtn">ออกจากระบบ</a>
  `;

  document.getElementById('logoutBtn')?.addEventListener('click', async (e) => {
    e.preventDefault();
    await logout();
    window.location.reload();
  });
}

// ───────── Render categories ─────────
async function renderCategories() {
  const result = await shop.getCategories();
  if (!result.success || result.data.length === 0) return;

  const tabsEl = document.getElementById('categoryTabs');

  result.data.forEach(cat => {
    const tab = document.createElement('div');
    tab.className = 'cat-tab';
    tab.dataset.cat = cat.id;
    tab.textContent = cat.name;
    tab.addEventListener('click', () => selectTab(tab, cat.id));
    tabsEl.appendChild(tab);
  });

  document.querySelector('.cat-tab[data-cat=""]')
    .addEventListener('click', (e) => selectTab(e.target, null));
}

function selectTab(tabEl, categoryId) {
  document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
  tabEl.classList.add('active');
  renderProducts(categoryId);
}

// ───────── Render star rating ─────────
function renderStars(rating) {
  const full = Math.round(rating);
  return '★'.repeat(full) + '☆'.repeat(5 - full);
}

// ───────── Render products (ดึงจาก DB เท่านั้น ไม่มี hardcode) ─────────
async function renderProducts(categoryId = null) {
  const gridEl = document.getElementById('productGrid');
  gridEl.innerHTML = `<div class="loading-state">กำลังโหลดสินค้า...</div>`;

  let result;
  try {
    result = await shop.getProducts(categoryId);
  } catch(e) {
    gridEl.innerHTML = `<div class="empty-state" style="color:red;font-size:12px;padding:16px;word-break:break-all;">EXCEPTION: ${e.message}</div>`;
    return;
  }

  if (!result.success) {
    gridEl.innerHTML = `<div class="empty-state" style="color:red;font-size:12px;padding:16px;word-break:break-all;">ERROR: ${result.error || 'unknown'}</div>`;
    return;
  }

  if (result.data.length === 0) {
    gridEl.innerHTML = `<div class="empty-state">ยังไม่มีสินค้าในหมวดนี้</div>`;
    return;
  }

  gridEl.innerHTML = result.data.map(p => {
    const inStock = p.stock_count > 0;
    const stockBadgeClass = inStock ? 'in-stock' : 'out-of-stock';
    const stockBadgeText = inStock ? 'พร้อมขาย' : 'สินค้าหมด';
    const stockTextClass = inStock ? '' : 'zero';
    const stockText = inStock ? `เหลือ ${p.stock_count} ไอดี` : 'สินค้าหมด';
    // escape ทุก field ที่มาจาก DB ก่อนใส่ใน HTML attribute หรือ text
    const safeName = escapeHtml(p.name);
    const safeImg  = p.image_url ? escapeHtml(p.image_url) : '../images/placeholder.png';

    return `
      <div class="product-card">
        <div class="product-img-wrap">
          <img src="${safeImg}" alt="${safeName}" loading="lazy"
               onerror="this.style.display='none'">
          <span class="stock-badge-overlay ${stockBadgeClass}">${stockBadgeText}</span>
        </div>
        <div class="product-info">
          <div class="product-name">${safeName}</div>
          <div class="product-rating">${renderStars(p.rating)}</div>
          <div class="product-price">฿${Number(p.price).toLocaleString()}</div>
          <div class="product-stock-text ${stockTextClass}">${stockText}</div>
          <a href="/pages/product.html?id=${p.id}" class="detail-btn">ดูรายละเอียด</a>
        </div>
      </div>
    `;
  }).join('');
}

// ป้องกัน XSS จากชื่อสินค้า/ข้อมูลที่มาจาก DB
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ───────── Init ─────────
renderNav();
renderCategories();
renderProducts();
</script>

</body>
</html>
