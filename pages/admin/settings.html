<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ตั้งค่าเว็บไซต์ — Admin</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap');
  :root{--navy:#1A6BA0;--gold:#D9A330;--ink:#1A3A52;--green-go:#3F8557;--danger:#E04433;--line:rgba(26,106,160,0.15);}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'IBM Plex Sans Thai',sans-serif;background:#F0F4F8;color:var(--ink);min-height:100vh;padding:16px 14px 40px;}
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
  .back-link{font-size:13px;font-weight:600;color:var(--navy);text-decoration:none;}
  .page-title{font-family:'Baloo 2',sans-serif;font-size:18px;font-weight:800;margin-bottom:14px;}
  .card{background:#fff;border-radius:13px;padding:16px;box-shadow:0 2px 10px rgba(0,40,80,0.08);margin-bottom:14px;}
  .card-title{font-size:14px;font-weight:700;margin-bottom:12px;}
  .field{margin-bottom:14px;}
  .field label{font-size:12.5px;font-weight:600;display:block;margin-bottom:5px;}
  .field input[type=text],.field textarea{width:100%;padding:10px 12px;border:1.5px solid var(--line);border-radius:8px;font-size:13px;font-family:'IBM Plex Sans Thai',sans-serif;background:#fff;}
  .field textarea{min-height:70px;resize:vertical;}
  .field input[type=color]{width:60px;height:38px;border:1.5px solid var(--line);border-radius:8px;padding:2px;cursor:pointer;}
  .asset-preview{width:100%;max-width:220px;border-radius:10px;margin-bottom:10px;background:rgba(26,106,160,0.05);display:block;}
  .asset-preview.empty{padding:30px;text-align:center;color:rgba(26,58,82,0.4);font-size:12px;}
  .upload-btn{padding:9px 14px;background:rgba(26,106,160,0.08);color:var(--navy);border:none;border-radius:8px;font-size:12.5px;font-weight:600;cursor:pointer;font-family:'IBM Plex Sans Thai',sans-serif;}
  .submit-btn{width:100%;padding:12px 0;background:var(--navy);color:#fff;border:none;border-radius:9px;font-size:14px;font-weight:700;font-family:'Baloo 2',sans-serif;cursor:pointer;margin-top:6px;}
  .submit-btn:disabled{opacity:0.5;cursor:not-allowed;}
  .form-alert{padding:9px 11px;border-radius:8px;font-size:12.5px;margin-top:10px;display:none;}
  .form-alert.show{display:block;}
  .form-alert.error{background:rgba(224,68,51,0.1);color:var(--danger);}
  .form-alert.success{background:rgba(63,133,87,0.1);color:var(--green-go);}
</style>
</head>
<body>

<div class="topbar">
  <a href="/pages/admin/dashboard.html" class="back-link">← Dashboard</a>
</div>
<div class="page-title">⚙️ ตั้งค่าเว็บไซต์</div>

<div class="card">
  <div class="card-title">โลโก้</div>
  <img class="asset-preview" id="logoPreview" alt="Logo">
  <input type="file" id="logoFile" accept="image/jpeg,image/png,image/webp" style="display:none;">
  <button class="upload-btn" id="logoUploadBtn">อัปโหลดโลโก้ใหม่</button>
</div>

<div class="card">
  <div class="card-title">แบนเนอร์</div>
  <img class="asset-preview" id="bannerPreview" alt="Banner">
  <input type="file" id="bannerFile" accept="image/jpeg,image/png,image/webp" style="display:none;">
  <button class="upload-btn" id="bannerUploadBtn">อัปโหลดแบนเนอร์ใหม่</button>
</div>

<div class="card">
  <div class="card-title">ข้อความและเนื้อหา</div>
  <div class="field">
    <label>สีหลักของเว็บไซต์</label>
    <input type="color" id="fColor" value="#1A6BA0">
  </div>
  <div class="field">
    <label>ข้อความหน้าแรก</label>
    <textarea id="fHomeText" placeholder="เช่น ซื้อไอดี SimCity BuildIt พร้อมเล่น ส่งรวดเร็ว ปลอดภัย 100%"></textarea>
  </div>
  <div class="field">
    <label>ข้อความ Footer</label>
    <textarea id="fFooterText" placeholder="เช่น © 2026 Mayor Service สงวนลิขสิทธิ์"></textarea>
  </div>
  <div class="field">
    <label>ช่องทางติดต่อ</label>
    <textarea id="fContactInfo" placeholder="เช่น Line: @mayorservice, โทร 08x-xxx-xxxx"></textarea>
  </div>
  <div class="field">
    <label>ประกาศ (แสดงบนหน้าแรก ถ้ามี)</label>
    <textarea id="fAnnouncement" placeholder="เช่น ปิดปรับปรุงระบบวันที่ 25 ก.ค. เวลา 02:00-04:00 น."></textarea>
  </div>
  <button class="submit-btn" id="saveBtn">บันทึกการตั้งค่า</button>
  <div class="form-alert" id="formAlert"></div>
</div>

<script type="module">
import { auth, admin } from '../../js/api.js';

const session = await auth.getSession();
if (!session) { window.location.href = '/pages/login.html'; }

const res = await fetch('/api/auth/profile', { headers: { Authorization: `Bearer ${session.access_token}` } });
const { data: profile } = await res.json();
if (profile?.role !== 'admin') { window.location.href = '/pages/shop.html'; }

function setPreview(imgEl, url) {
  if (url) {
    imgEl.src = url;
    imgEl.classList.remove('empty');
  } else {
    imgEl.removeAttribute('src');
    imgEl.classList.add('empty');
    imgEl.alt = 'ยังไม่มีรูป';
  }
}

async function loadSettings() {
  try {
    const { data: s } = await admin.settings.get();
    setPreview(document.getElementById('logoPreview'), s.logo_url);
    setPreview(document.getElementById('bannerPreview'), s.banner_url);
    document.getElementById('fColor').value       = s.primary_color || '#1A6BA0';
    document.getElementById('fHomeText').value    = s.home_text || '';
    document.getElementById('fFooterText').value  = s.footer_text || '';
    document.getElementById('fContactInfo').value = s.contact_info || '';
    document.getElementById('fAnnouncement').value = s.announcement || '';
  } catch (e) {
    document.getElementById('formAlert').textContent = 'โหลดการตั้งค่าไม่สำเร็จ';
    document.getElementById('formAlert').className = 'form-alert show error';
  }
}

// อัปโหลด logo/banner — บันทึกลง site_settings ทันทีที่อัปโหลดสำเร็จ (ไม่ต้องกด "บันทึก" ซ้ำ)
document.getElementById('logoUploadBtn').addEventListener('click', () => document.getElementById('logoFile').click());
document.getElementById('bannerUploadBtn').addEventListener('click', () => document.getElementById('bannerFile').click());

document.getElementById('logoFile').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  try {
    const { data } = await admin.uploadAsset('logo_url', file);
    setPreview(document.getElementById('logoPreview'), data.url);
  } catch (err) { alert(err.message); }
});

document.getElementById('bannerFile').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  try {
    const { data } = await admin.uploadAsset('banner_url', file);
    setPreview(document.getElementById('bannerPreview'), data.url);
  } catch (err) { alert(err.message); }
});

document.getElementById('saveBtn').addEventListener('click', async () => {
  const alertEl = document.getElementById('formAlert');
  const btn = document.getElementById('saveBtn');
  btn.disabled = true; btn.textContent = 'กำลังบันทึก...';
  try {
    await admin.settings.update({
      primary_color: document.getElementById('fColor').value,
      home_text:     document.getElementById('fHomeText').value.trim(),
      footer_text:   document.getElementById('fFooterText').value.trim(),
      contact_info:  document.getElementById('fContactInfo').value.trim(),
      announcement:  document.getElementById('fAnnouncement').value.trim(),
    });
    alertEl.textContent = 'บันทึกสำเร็จ';
    alertEl.className = 'form-alert show success';
  } catch (e) {
    alertEl.textContent = e.message;
    alertEl.className = 'form-alert show error';
  }
  btn.disabled = false; btn.textContent = 'บันทึกการตั้งค่า';
});

loadSettings();
</script>
</body>
</html>
