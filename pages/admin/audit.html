<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audit Log — Admin</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Sarabun',sans-serif;background:#0a0f1a;color:#fff;min-height:100vh}
  nav{background:#111827;padding:14px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #1f2937}
  .nav-logo{font-size:16px;font-weight:700;color:#9ca3af}
  .nav-logo strong{color:#fff}
  .nav-right{display:flex;gap:8px}
  .nav-link{color:#6b7280;text-decoration:none;font-size:13px;padding:6px 12px;border-radius:8px}
  .nav-link:hover,.nav-link.active{color:#fff;background:#1f2937}
  .btn-sm{padding:6px 14px;background:#374151;color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer}
  main{padding:20px}
  h1{font-size:20px;font-weight:700;margin-bottom:16px}
  .log-item{background:#111827;border-radius:12px;padding:12px 14px;margin-bottom:8px;border-left:3px solid #374151}
  .log-item.order{border-color:#1d4ed8}
  .log-item.approve{border-color:#16a34a}
  .log-item.reject{border-color:#dc2626}
  .log-action{font-size:13px;font-weight:600;margin-bottom:4px}
  .log-meta{font-size:12px;color:#6b7280}
  .log-detail{font-size:11px;color:#4b5563;margin-top:4px;font-family:monospace}
  .empty{text-align:center;color:#6b7280;padding:60px 20px}
  .loading{text-align:center;color:#6b7280;padding:60px 20px}
  .spinner{width:28px;height:28px;border:3px solid #374151;border-top-color:#1d4ed8;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<nav>
  <div class="nav-logo"><strong>Admin</strong> — Mayor Service</div>
  <div class="nav-right">
    <a href="/pages/admin/orders.html" class="nav-link">ออเดอร์</a>
    <a href="/pages/admin/inventory.html" class="nav-link">คลังไอดี</a>
    <a href="/pages/admin/audit.html" class="nav-link active">Log</a>
    <button class="btn-sm" onclick="import('../../js/core/auth.js').then(m=>m.logout())">ออก</button>
  </div>
</nav>
<main>
  <h1>Audit Log</h1>
  <div id="logList"><div class="loading"><div class="spinner"></div>กำลังโหลด...</div></div>
</main>
<script type="module">
import { admin } from '../../js/core/api.js';
import { requireAdmin } from '../../js/core/auth.js';

await requireAdmin();

const res = await admin.getAuditLogs();
const list = document.getElementById('logList');
if (!res.success) {
  list.innerHTML = '<div class="empty">เกิดข้อผิดพลาด: ' + res.error + '</div>';
} else if (res.data.length === 0) {
  list.innerHTML = '<div class="empty">ยังไม่มี log</div>';
} else {
  list.innerHTML = res.data.map(l => {
    const cls = l.action.includes('approved') ? 'approve' : l.action.includes('rejected') ? 'reject' : 'order';
    const date = new Date(l.created_at).toLocaleString('th-TH');
    const detail = l.details ? JSON.stringify(l.details) : '';
    return `
      <div class="log-item ${cls}">
        <div class="log-action">${l.action}</div>
        <div class="log-meta">${l.profiles?.email || 'system'} · ${date}</div>
        ${detail ? `<div class="log-detail">${detail}</div>` : ''}
      </div>
    `;
  }).join('');
}
</script>
</body>
</html>
