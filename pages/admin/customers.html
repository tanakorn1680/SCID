<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>สมาชิก — Admin</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap');
  :root{--navy:#1A6BA0;--gold:#D9A330;--ink:#1A3A52;--green-go:#3F8557;--danger:#E04433;--line:rgba(26,106,160,0.15);}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'IBM Plex Sans Thai',sans-serif;background:#F0F4F8;color:var(--ink);min-height:100vh;padding:16px 14px 40px;}
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
  .back-link{font-size:13px;font-weight:600;color:var(--navy);text-decoration:none;}
  .page-title{font-family:'Baloo 2',sans-serif;font-size:18px;font-weight:800;margin-bottom:14px;}
  .search-input{width:100%;padding:10px 14px;border:1.5px solid var(--line);border-radius:9px;font-size:13px;font-family:'IBM Plex Sans Thai',sans-serif;background:#fff;margin-bottom:14px;}
  .card{background:#fff;border-radius:13px;padding:16px;box-shadow:0 2px 10px rgba(0,40,80,0.08);}
  .cust-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px dotted var(--line);gap:10px;}
  .cust-row:last-child{border-bottom:none;}
  .cust-email{font-size:13px;font-weight:600;word-break:break-all;}
  .cust-meta{font-size:11.5px;color:rgba(26,58,82,0.5);margin-top:2px;}
  .cust-stats{text-align:right;flex-shrink:0;}
  .cust-spent{font-family:'Baloo 2',sans-serif;font-weight:800;color:var(--gold);font-size:14px;}
  .cust-orders{font-size:11px;color:rgba(26,58,82,0.5);}
  .empty-state{text-align:center;padding:30px 20px;color:rgba(26,58,82,0.5);font-size:13px;}
</style>
</head>
<body>

<div class="topbar">
  <a href="/pages/admin/dashboard.html" class="back-link">← Dashboard</a>
</div>
<div class="page-title">👥 สมาชิก</div>

<input type="text" class="search-input" id="searchInput" placeholder="ค้นหาอีเมล...">

<div class="card">
  <div id="custList"><div class="empty-state">กำลังโหลด...</div></div>
</div>

<script type="module">
import { auth, admin } from '../../js/api.js';

const session = await auth.getSession();
if (!session) { window.location.href = '/pages/login.html'; }

const res = await fetch('/api/auth/profile', { headers: { Authorization: `Bearer ${session.access_token}` } });
const { data: profile } = await res.json();
if (profile?.role !== 'admin') { window.location.href = '/pages/shop.html'; }

let allCustomers = [];

function render(list) {
  const listEl = document.getElementById('custList');
  if (!list.length) {
    listEl.innerHTML = `<div class="empty-state">ไม่พบสมาชิก</div>`;
    return;
  }
  listEl.innerHTML = list.map(c => `
    <div class="cust-row">
      <div>
        <div class="cust-email">${c.email}</div>
        <div class="cust-meta">สมัครเมื่อ ${new Date(c.created_at).toLocaleDateString('th-TH')}</div>
      </div>
      <div class="cust-stats">
        <div class="cust-spent">฿${Number(c.total_spent).toLocaleString()}</div>
        <div class="cust-orders">${c.order_count} ออเดอร์</div>
      </div>
    </div>
  `).join('');
}

async function loadCustomers() {
  const listEl = document.getElementById('custList');
  listEl.innerHTML = `<div class="empty-state">กำลังโหลด...</div>`;
  try {
    const { data } = await admin.customers();
    allCustomers = data;
    render(allCustomers);
  } catch (e) {
    listEl.innerHTML = `<div class="empty-state">โหลดไม่สำเร็จ</div>`;
  }
}

document.getElementById('searchInput').addEventListener('input', (e) => {
  const q = e.target.value.trim().toLowerCase();
  render(allCustomers.filter(c => c.email.toLowerCase().includes(q)));
});

loadCustomers();
</script>
</body>
</html>
