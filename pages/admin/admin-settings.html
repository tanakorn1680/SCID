<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ตั้งค่าผู้ดูแลระบบ — Admin</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap');
  :root{--navy:#1A6BA0;--gold:#D9A330;--ink:#1A3A52;--green-go:#3F8557;--danger:#E04433;--line:rgba(26,106,160,0.15);}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'IBM Plex Sans Thai',sans-serif;background:#F0F4F8;color:var(--ink);min-height:100vh;padding:16px 14px 40px;}
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
  .back-link{font-size:13px;font-weight:600;color:var(--navy);text-decoration:none;}
  .page-title{font-family:'Baloo 2',sans-serif;font-size:18px;font-weight:800;margin-bottom:14px;}
  .card{background:#fff;border-radius:13px;padding:16px;box-shadow:0 2px 10px rgba(0,40,80,0.08);margin-bottom:14px;}
  .card-title{font-size:14px;font-weight:700;margin-bottom:4px;}
  .card-sub{font-size:12px;color:rgba(26,58,82,0.5);margin-bottom:12px;line-height:1.5;}
  .field{margin-bottom:12px;}
  .field label{font-size:12.5px;font-weight:600;display:block;margin-bottom:5px;}
  .field input{width:100%;padding:10px 12px;border:1.5px solid var(--line);border-radius:8px;font-size:13px;font-family:'IBM Plex Sans Thai',sans-serif;background:#fff;}
  .field-with-toggle{position:relative;}
  .field-toggle{position:absolute;right:10px;top:50%;transform:translateY(-50%);cursor:pointer;font-size:12px;color:rgba(26,58,82,0.5);background:none;border:none;font-family:'IBM Plex Sans Thai',sans-serif;padding:4px;}
  .strength-bar{height:4px;border-radius:2px;background:rgba(26,58,82,0.1);margin-top:6px;overflow:hidden;}
  .strength-bar-fill{height:100%;width:0%;border-radius:2px;transition:width .2s ease,background-color .2s ease;}
  .strength-label{font-size:11.5px;margin-top:4px;color:rgba(26,58,82,0.5);}
  .submit-btn{width:100%;padding:12px 0;background:var(--navy);color:#fff;border:none;border-radius:9px;font-size:14px;font-weight:700;font-family:'Baloo 2',sans-serif;cursor:pointer;}
  .submit-btn:disabled{opacity:0.5;cursor:not-allowed;}
  .submit-btn.danger{background:rgba(224,68,51,0.1);color:var(--danger);}
  .form-alert{padding:9px 11px;border-radius:8px;font-size:12.5px;margin-top:10px;display:none;line-height:1.5;}
  .form-alert.show{display:block;}
  .form-alert.error{background:rgba(224,68,51,0.1);color:var(--danger);}
  .form-alert.success{background:rgba(63,133,87,0.1);color:var(--green-go);}
</style>
</head>
<body>

<div class="topbar">
  <a href="/pages/admin/dashboard.html" class="back-link">← Dashboard</a>
</div>
<div class="page-title">🔐 ตั้งค่าผู้ดูแลระบบ</div>

<div class="card">
  <div class="card-title">รหัสผ่าน</div>
  <div class="card-sub">ตั้งรหัสผ่านใหม่สำหรับเข้าสู่ระบบแอดมิน</div>

  <div class="field">
    <label>รหัสผ่านใหม่</label>
    <div class="field-with-toggle">
      <input type="password" id="newPassword" placeholder="••••••••">
      <button type="button" class="field-toggle" data-toggle-for="newPassword">แสดง</button>
    </div>
    <div class="strength-bar"><div class="strength-bar-fill" id="strengthBarFill"></div></div>
    <div class="strength-label" id="strengthLabel"></div>
  </div>
  <div class="field">
    <label>ยืนยันรหัสผ่านใหม่</label>
    <div class="field-with-toggle">
      <input type="password" id="newPasswordConfirm" placeholder="••••••••">
      <button type="button" class="field-toggle" data-toggle-for="newPasswordConfirm">แสดง</button>
    </div>
  </div>
  <button class="submit-btn" id="passwordBtn" disabled>เปลี่ยนรหัสผ่าน</button>
  <div class="form-alert" id="passwordAlert"></div>
</div>

<div class="card">
  <button class="submit-btn danger" id="logoutBtn">ออกจากระบบ</button>
</div>

<script type="module">
import { auth } from '../../js/api.js';

const session = await auth.getSession();
if (!session) { window.location.href = '/pages/login.html'; }

const res = await fetch('/api/auth/profile', { headers: { Authorization: `Bearer ${session.access_token}` } });
const { data: profile } = await res.json();
if (profile?.role !== 'admin') { window.location.href = '/pages/shop.html'; }

// ── เปลี่ยนรหัสผ่าน ─────────────────────────────────────────
document.querySelectorAll('.field-toggle').forEach(btn => {
  btn.addEventListener('click', () => {
    const input = document.getElementById(btn.dataset.toggleFor);
    const isHidden = input.type === 'password';
    input.type = isHidden ? 'text' : 'password';
    btn.textContent = isHidden ? 'ซ่อน' : 'แสดง';
  });
});

function checkPasswordStrength(pw) {
  if (!pw) return { score: 0, label: '', color: 'transparent' };
  const isAllSameChar = /^(.)\1+$/.test(pw);
  const isSequential  = /^(0123456789|1234567890|abcdefgh|password|12345678)/i.test(pw);
  const hasLower = /[a-z]/.test(pw);
  const hasUpper = /[A-Z]/.test(pw);
  const hasDigit = /[0-9]/.test(pw);
  const hasSymbol = /[^a-zA-Z0-9]/.test(pw);
  const variety = [hasLower, hasUpper, hasDigit, hasSymbol].filter(Boolean).length;

  if (pw.length < 8 || isAllSameChar || isSequential) {
    return { score: 1, label: 'รหัสผ่านอ่อนเกินไป', color: 'var(--danger)' };
  }
  if (variety <= 2) {
    return { score: 2, label: 'พอใช้ — ลองเพิ่มตัวเลขหรือสัญลักษณ์', color: 'var(--gold)' };
  }
  return { score: 3, label: 'รหัสผ่านแข็งแรงดี', color: 'var(--green-go)' };
}

function updatePasswordState() {
  const password = document.getElementById('newPassword').value;
  const confirm   = document.getElementById('newPasswordConfirm').value;
  const strength  = checkPasswordStrength(password);

  const fill  = document.getElementById('strengthBarFill');
  const label = document.getElementById('strengthLabel');
  fill.style.width = `${(strength.score / 3) * 100}%`;
  fill.style.backgroundColor = strength.color;
  label.textContent = strength.label;
  label.style.color = strength.color === 'transparent' ? 'rgba(26,58,82,0.5)' : strength.color;

  document.getElementById('passwordBtn').disabled =
    !(strength.score >= 2 && password === confirm && confirm.length > 0);
}

['newPassword', 'newPasswordConfirm'].forEach(id => {
  document.getElementById(id).addEventListener('input', updatePasswordState);
});

document.getElementById('passwordBtn').addEventListener('click', async () => {
  const password = document.getElementById('newPassword').value;
  const alertEl   = document.getElementById('passwordAlert');
  const btn       = document.getElementById('passwordBtn');

  btn.disabled = true; btn.textContent = 'กำลังบันทึก...';
  try {
    await auth.updatePassword(password);
    alertEl.textContent = 'เปลี่ยนรหัสผ่านสำเร็จ';
    alertEl.className = 'form-alert show success';
    document.getElementById('newPassword').value = '';
    document.getElementById('newPasswordConfirm').value = '';
    document.getElementById('strengthBarFill').style.width = '0%';
    document.getElementById('strengthLabel').textContent = '';
  } catch (e) {
    alertEl.textContent = e.message;
    alertEl.className = 'form-alert show error';
  }
  btn.disabled = false; btn.textContent = 'เปลี่ยนรหัสผ่าน';
});

// ── ออกจากระบบ ──────────────────────────────────────────────
document.getElementById('logoutBtn').addEventListener('click', async () => {
  if (!confirm('ออกจากระบบ?')) return;
  await auth.logout();
  window.location.href = '/pages/login.html';
});
</script>
</body>
</html>
