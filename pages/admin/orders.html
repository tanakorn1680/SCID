<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ออเดอร์ — Admin</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Sarabun',sans-serif;background:#0a0f1a;color:#fff;min-height:100vh}
  nav{background:#111827;padding:14px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #1f2937}
  .nav-logo{font-size:16px;font-weight:700;color:#9ca3af}
  .nav-logo strong{color:#fff}
  .nav-right{display:flex;gap:8px}
  .nav-link{color:#6b7280;text-decoration:none;font-size:13px;padding:6px 12px;border-radius:8px}
  .nav-link:hover,.nav-link.active{color:#fff;background:#1f2937}
  .btn-sm{padding:6px 14px;background:#374151;color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer}
  main{padding:20px}
  h1{font-size:20px;font-weight:700;margin-bottom:16px}
  .filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
  .filter-btn{padding:8px 16px;border-radius:20px;border:1.5px solid #374151;background:transparent;color:#9ca3af;cursor:pointer;font-size:13px;transition:.2s}
  .filter-btn.active,.filter-btn:hover{border-color:#1d4ed8;color:#fff;background:#1d4ed8}
  input.search{background:#111827;border:1.5px solid #374151;border-radius:10px;color:#fff;padding:10px 14px;font-size:14px;outline:none;width:100%;margin-bottom:12px}
  input.search:focus{border-color:#1d4ed8}
  .order-card{background:#111827;border-radius:14px;padding:16px;margin-bottom:10px;border:1.5px solid transparent;cursor:pointer;transition:.2s}
  .order-card:hover{border-color:#1f2937}
  .order-top{display:flex;justify-content:space-between;margin-bottom:6px}
  .order-id{font-size:11px;color:#6b7280}
  .badge{padding:3px 10px;border-radius:10px;font-size:12px;font-weight:600}
  .badge.pending{background:#1e3a5f;color:#60a5fa}
  .badge.awaiting{background:#451a03;color:#fb923c}
  .badge.delivered{background:#052e16;color:#86efac}
  .badge.cancelled{background:#1c1917;color:#78716c}
  .order-name{font-size:15px;font-weight:600;margin-bottom:4px}
  .order-meta{display:flex;justify-content:space-between;font-size:13px;color:#6b7280;margin-top:4px}
  .order-price{font-size:18px;font-weight:700;color:#f59e0b}
  .empty{text-align:center;color:#6b7280;padding:60px 20px}
  .loading{text-align:center;color:#6b7280;padding:60px 20px}
  .spinner{width:32px;height:32px;border:3px solid #374151;border-top-color:#1d4ed8;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* Modal */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:flex-end;justify-content:center;z-index:200}
  .overlay.hidden{display:none}
  .modal{background:#111827;border-radius:20px 20px 0 0;width:100%;max-width:520px;padding:24px 20px 40px;max-height:92vh;overflow-y:auto}
  .modal-handle{width:40px;height:4px;background:#374151;border-radius:2px;margin:0 auto 20px}
  .info-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #1f2937;font-size:14px}
  .info-row:last-child{border:none}
  .slip-wrap{margin:16px 0;text-align:center}
  .slip-img{width:100%;border-radius:10px;max-height:280px;object-fit:contain;background:#0a0f1a;cursor:zoom-in}
  .slip-loading{padding:40px;color:#6b7280;font-size:14px}
  .slip-error{padding:20px;background:#450a0a;border-radius:10px;color:#fca5a5;font-size:13px;text-align:center}
  .action-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
  .btn-approve{padding:14px;background:#166534;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer}
  .btn-approve:hover{background:#15803d}
  .btn-reject{padding:14px;background:#7f1d1d;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer}
  .btn-reject:hover{background:#991b1b}
  .btn-close-modal{width:100%;padding:12px;background:transparent;color:#9ca3af;border:1.5px solid #374151;border-radius:12px;font-size:14px;cursor:pointer;margin-top:10px}
  .msg{padding:10px 14px;border-radius:8px;font-size:13px;margin-top:10px;display:none}
  .msg.error{background:#450a0a;color:#fca5a5;display:block}
  .msg.success{background:#052e16;color:#86efac;display:block}
  textarea.reject-input{width:100%;background:#0a0f1a;border:1.5px solid #374151;border-radius:10px;color:#fff;padding:10px;font-size:14px;outline:none;margin-top:8px;resize:none;min-height:70px}
  textarea.reject-input:focus{border-color:#ef4444}

  /* Lightbox */
  .lightbox{position:fixed;inset:0;background:rgba(0,0,0,.95);display:flex;align-items:center;justify-content:center;z-index:300}
  .lightbox.hidden{display:none}
  .lightbox img{max-width:95vw;max-height:90vh;object-fit:contain;border-radius:8px}
  .lightbox-close{position:absolute;top:20px;right:20px;background:#374151;color:#fff;border:none;border-radius:50%;width:36px;height:36px;font-size:18px;cursor:pointer}
</style>
</head>
<body>
<nav>
  <div class="nav-logo"><strong>Admin</strong> — Mayor Service</div>
  <div class="nav-right">
    <a href="/pages/admin/orders.html" class="nav-link active">ออเดอร์</a>
    <a href="/pages/admin/inventory.html" class="nav-link">คลังไอดี</a>
    <a href="/pages/admin/audit.html" class="nav-link">Log</a>
    <button class="btn-sm" onclick="import('../../js/core/auth.js').then(m=>m.logout())">ออก</button>
  </div>
</nav>
<main>
  <h1>ออเดอร์ทั้งหมด</h1>
  <input class="search" id="searchInput" placeholder="ค้นหา Order ID หรืออีเมล..." oninput="onSearch()">
  <div class="filters">
    <button class="filter-btn active" onclick="setFilter(null,this)">ทั้งหมด</button>
    <button class="filter-btn" onclick="setFilter('awaiting_slip_review',this)">รอตรวจสลิป</button>
    <button class="filter-btn" onclick="setFilter('delivered',this)">ส่งแล้ว</button>
    <button class="filter-btn" onclick="setFilter('cancelled',this)">ยกเลิก</button>
    <button class="filter-btn" onclick="setFilter('pending',this)">รอชำระ</button>
  </div>
  <div id="content"><div class="loading"><div class="spinner"></div>กำลังโหลด...</div></div>
</main>

<!-- Order Modal -->
<div class="overlay hidden" id="overlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div id="modalContent"></div>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox hidden" id="lightbox" onclick="document.getElementById('lightbox').classList.add('hidden')">
  <button class="lightbox-close" onclick="document.getElementById('lightbox').classList.add('hidden')">×</button>
  <img id="lightboxImg" src="">
</div>

<script type="module">
import { admin } from '../../js/core/api.js';
import { requireAdmin } from '../../js/core/auth.js';

await requireAdmin();

const ENCRYPT_KEY = '__ENCRYPT_KEY__';

let allOrders = [];
let currentFilter = null;

const statusLabel = {
  pending:              { text: 'รอชำระ',       cls: 'pending'   },
  awaiting_slip_review: { text: 'รอตรวจสลิป',   cls: 'awaiting'  },
  paid:                 { text: 'ชำระแล้ว',     cls: 'awaiting'  },
  delivered:            { text: 'ส่งแล้ว',      cls: 'delivered' },
  cancelled:            { text: 'ยกเลิก',       cls: 'cancelled' }
};

async function loadOrders() {
  document.getElementById('content').innerHTML = '<div class="loading"><div class="spinner"></div>กำลังโหลด...</div>';
  const res = await admin.getOrders(currentFilter, '');
  if (!res.success) {
    document.getElementById('content').innerHTML = '<div class="empty">เกิดข้อผิดพลาด: ' + res.error + '</div>';
    return;
  }
  allOrders = res.data;
  renderOrders(allOrders);
}

function renderOrders(orders) {
  const content = document.getElementById('content');
  const search = document.getElementById('searchInput').value.toLowerCase();
  let filtered = orders;
  if (search) {
    filtered = orders.filter(o =>
      o.id.toLowerCase().includes(search) ||
      (o.profiles?.email || '').toLowerCase().includes(search)
    );
  }
  if (filtered.length === 0) {
    content.innerHTML = '<div class="empty">ไม่พบออเดอร์</div>';
    return;
  }
  content.innerHTML = filtered.map(o => {
    const st = statusLabel[o.status] || { text: o.status, cls: 'pending' };
    const item = o.order_items?.[0];
    const date = new Date(o.created_at).toLocaleDateString('th-TH', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' });
    return `
      <div class="order-card" onclick="openOrder('${o.id}')">
        <div class="order-top">
          <span class="order-id">#${o.id.slice(0,8).toUpperCase()}</span>
          <span class="badge ${st.cls}">${st.text}</span>
        </div>
        <div class="order-name">${item?.product_name || 'สินค้า'}</div>
        <div class="order-meta">
          <span>${o.profiles?.email || '-'}</span>
          <span>${date}</span>
        </div>
        <div class="order-price">${Number(o.total_amount).toLocaleString('th-TH')} บาท</div>
      </div>
    `;
  }).join('');
}

window.setFilter = (status, btn) => {
  currentFilter = status;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadOrders();
};

window.onSearch = () => renderOrders(allOrders);

window.openOrder = async (orderId) => {
  const o = allOrders.find(x => x.id === orderId);
  if (!o) return;
  const st = statusLabel[o.status] || { text: o.status, cls: 'pending' };
  const item = o.order_items?.[0];
  const date = new Date(o.created_at).toLocaleString('th-TH');
  const slipDate = o.slip_submitted_at ? new Date(o.slip_submitted_at).toLocaleString('th-TH') : '-';

  document.getElementById('modalContent').innerHTML = `
    <h2 style="margin-bottom:16px">รายละเอียดออเดอร์</h2>
    <div class="info-row"><span>Order ID</span><span style="font-size:11px;color:#6b7280">${o.id}</span></div>
    <div class="info-row"><span>ลูกค้า</span><span>${o.profiles?.email || '-'}</span></div>
    <div class="info-row"><span>สินค้า</span><span>${item?.product_name || '-'}</span></div>
    <div class="info-row"><span>ราคา</span><span style="color:#f59e0b;font-weight:700">${Number(o.total_amount).toLocaleString('th-TH')} บาท</span></div>
    <div class="info-row"><span>สถานะ</span><span class="badge ${st.cls}">${st.text}</span></div>
    <div class="info-row"><span>สั่งเมื่อ</span><span>${date}</span></div>
    ${o.status === 'awaiting_slip_review' || o.slip_storage_path ? `<div class="info-row"><span>ส่งสลิปเมื่อ</span><span>${slipDate}</span></div>` : ''}
    ${o.reject_reason ? `<div class="info-row"><span>เหตุผลปฏิเสธ</span><span style="color:#fca5a5">${o.reject_reason}</span></div>` : ''}

    ${o.slip_storage_path ? `
      <div class="slip-wrap">
        <div id="slipArea" class="slip-loading">⏳ กำลังโหลดรูปสลิป...</div>
      </div>
    ` : '<div style="padding:12px 0;color:#6b7280;font-size:13px;text-align:center">ยังไม่มีสลิป</div>'}

    ${o.status === 'awaiting_slip_review' ? `
      <div class="action-btns">
        <button class="btn-approve" id="btnApprove" onclick="doApprove('${o.id}')">✓ อนุมัติ</button>
        <button class="btn-reject" id="btnReject" onclick="showRejectForm('${o.id}')">✗ ปฏิเสธ</button>
      </div>
      <div id="rejectForm" style="display:none;margin-top:12px">
        <textarea class="reject-input" id="rejectReason" placeholder="ระบุเหตุผล..."></textarea>
        <button style="width:100%;padding:12px;background:#7f1d1d;color:#fff;border:none;border-radius:10px;font-size:14px;cursor:pointer;margin-top:8px" onclick="doReject('${o.id}')">ยืนยันปฏิเสธ</button>
      </div>
    ` : ''}

    <button class="btn-close-modal" onclick="document.getElementById('overlay').classList.add('hidden')">ปิด</button>
    <div class="msg" id="modalMsg"></div>
  `;

  document.getElementById('overlay').classList.remove('hidden');

  // โหลดรูปสลิป
  if (o.slip_storage_path) {
    const slipRes = await admin.getSlipSignedUrl(o.slip_storage_path);
    const slipArea = document.getElementById('slipArea');
    if (!slipArea) return;
    if (!slipRes.success) {
      slipArea.className = 'slip-error';
      slipArea.textContent = '⚠️ โหลดรูปสลิปไม่สำเร็จ';
      return;
    }
    slipArea.outerHTML = `<img class="slip-img" src="${slipRes.url}" alt="สลิป"
      onclick="document.getElementById('lightboxImg').src='${slipRes.url}';document.getElementById('lightbox').classList.remove('hidden')"
      onerror="this.outerHTML='<div class=slip-error>⚠️ โหลดรูปไม่สำเร็จ</div>'">`;
  }
};

window.handleOverlayClick = (e) => {
  if (e.target === document.getElementById('overlay')) {
    document.getElementById('overlay').classList.add('hidden');
  }
};

window.showRejectForm = () => {
  document.getElementById('rejectForm').style.display = '';
  document.getElementById('btnReject').style.display = 'none';
};

window.doApprove = async (orderId) => {
  const btn = document.getElementById('btnApprove');
  btn.disabled = true; btn.textContent = 'กำลังดำเนินการ...';
  const res = await admin.approve(orderId, ENCRYPT_KEY);
  if (!res.success) {
    showModalMsg(res.error, 'error');
    btn.disabled = false; btn.textContent = '✓ อนุมัติ';
    return;
  }
  showModalMsg('อนุมัติสำเร็จ! ส่ง credential ให้ลูกค้าแล้ว', 'success');
  setTimeout(() => { document.getElementById('overlay').classList.add('hidden'); loadOrders(); }, 1500);
};

window.doReject = async (orderId) => {
  const reason = document.getElementById('rejectReason').value.trim();
  if (!reason) { showModalMsg('กรุณาระบุเหตุผล', 'error'); return; }
  const res = await admin.reject(orderId, reason);
  if (!res.success) { showModalMsg(res.error, 'error'); return; }
  showModalMsg('ปฏิเสธเรียบร้อย', 'success');
  setTimeout(() => { document.getElementById('overlay').classList.add('hidden'); loadOrders(); }, 1500);
};

function showModalMsg(text, type) {
  const el = document.getElementById('modalMsg');
  if (!el) return;
  el.textContent = text;
  el.className = 'msg ' + type;
}

loadOrders();
</script>
</body>
</html>
