<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ช่องทางชำระเงิน — Admin</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap');
  :root{--navy:#1A6BA0;--gold:#D9A330;--ink:#1A3A52;--green-go:#3F8557;--danger:#E04433;--line:rgba(26,106,160,0.15);}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'IBM Plex Sans Thai',sans-serif;background:#F0F4F8;color:var(--ink);min-height:100vh;padding:16px 14px 40px;}
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
  .back-link{font-size:13px;font-weight:600;color:var(--navy);text-decoration:none;}
  .page-title{font-family:'Baloo 2',sans-serif;font-size:18px;font-weight:800;margin-bottom:14px;}
  .card{background:#fff;border-radius:13px;padding:16px;box-shadow:0 2px 10px rgba(0,40,80,0.08);margin-bottom:14px;}
  .card-title{font-size:14px;font-weight:700;margin-bottom:12px;}
  .field{margin-bottom:12px;}
  .field label{font-size:12.5px;font-weight:600;display:block;margin-bottom:5px;}
  .field input,.field select{width:100%;padding:10px 12px;border:1.5px solid var(--line);border-radius:8px;font-size:13px;font-family:'IBM Plex Sans Thai',sans-serif;background:#fff;}
  .submit-btn{width:100%;padding:12px 0;background:var(--navy);color:#fff;border:none;border-radius:9px;font-size:14px;font-weight:700;font-family:'Baloo 2',sans-serif;cursor:pointer;}
  .submit-btn:disabled{opacity:0.5;cursor:not-allowed;}
  .form-alert{padding:9px 11px;border-radius:8px;font-size:12.5px;margin-top:10px;display:none;}
  .form-alert.show{display:block;}
  .form-alert.error{background:rgba(224,68,51,0.1);color:var(--danger);}
  .form-alert.success{background:rgba(63,133,87,0.1);color:var(--green-go);}
  .method-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px dotted var(--line);gap:10px;}
  .method-row:last-child{border-bottom:none;}
  .method-info{flex:1;}
  .method-label{font-size:13px;font-weight:700;}
  .method-meta{font-size:11.5px;color:rgba(26,58,82,0.5);margin-top:2px;}
  .row-actions{display:flex;gap:6px;flex-shrink:0;}
  .icon-btn{background:rgba(26,106,160,0.08);border:none;border-radius:7px;padding:7px 10px;font-size:12px;cursor:pointer;color:var(--navy);font-family:'IBM Plex Sans Thai',sans-serif;}
  .icon-btn.danger{background:rgba(224,68,51,0.1);color:var(--danger);}
  .inactive{opacity:0.5;}
  .empty-state{text-align:center;padding:30px 20px;color:rgba(26,58,82,0.5);font-size:13px;}
</style>
</head>
<body>

<div class="topbar">
  <a href="/pages/admin/dashboard.html" class="back-link">← Dashboard</a>
</div>
<div class="page-title">💳 ช่องทางชำระเงิน</div>

<div class="card">
  <div class="card-title" id="formTitle">เพิ่มช่องทางใหม่</div>
  <div class="field">
    <label>ประเภท</label>
    <select id="fType">
      <option value="promptpay">PromptPay</option>
      <option value="bank">โอนธนาคาร</option>
      <option value="truemoney">TrueMoney Wallet</option>
      <option value="qr_code">QR Code (รูปภาพ)</option>
    </select>
  </div>
  <div class="field">
    <label>ชื่อที่แสดงให้ลูกค้าเห็น</label>
    <input type="text" id="fLabel" placeholder="เช่น PromptPay ธนกร">
  </div>

  <div id="typeFields"></div>

  <button class="submit-btn" id="saveBtn">บันทึกช่องทางใหม่</button>
  <button class="submit-btn" id="cancelEditBtn" style="display:none;background:rgba(26,58,82,0.15);color:var(--ink);margin-top:8px;">ยกเลิกแก้ไข</button>
  <div class="form-alert" id="formAlert"></div>
</div>

<div class="card">
  <div class="card-title">ช่องทางทั้งหมด</div>
  <div id="methodList"><div class="empty-state">กำลังโหลด...</div></div>
</div>

<script type="module">
import { auth, admin } from '../../js/api.js';

const session = await auth.getSession();
if (!session) { window.location.href = '/pages/login.html'; }

const res = await fetch('/api/auth/profile', { headers: { Authorization: `Bearer ${session.access_token}` } });
const { data: profile } = await res.json();
if (profile?.role !== 'admin') { window.location.href = '/pages/shop.html'; }

let editingId = null;

// field ของแต่ละ type — ต้องตรงกับ contract ที่ checkout.html คาดหวังใน details jsonb
const TYPE_FIELDS = {
  promptpay: [
    { key: 'promptpay_id',  label: 'เบอร์/เลขบัตร PromptPay' },
    { key: 'account_name',  label: 'ชื่อบัญชี' },
  ],
  bank: [
    { key: 'bank_name',      label: 'ชื่อธนาคาร' },
    { key: 'account_number', label: 'เลขบัญชี' },
    { key: 'account_name',   label: 'ชื่อบัญชี' },
  ],
  truemoney: [
    { key: 'phone_number', label: 'เบอร์โทร TrueMoney' },
    { key: 'account_name', label: 'ชื่อบัญชี' },
  ],
  // qr_code ไม่อยู่ในนี้ — ใช้ upload flow แยกต่างหาก ไม่ใช่ text input
};

let currentQrUrl = null;   // เก็บ URL รูป QR ที่อัปโหลดไว้ (สำหรับ type=qr_code เท่านั้น)

function renderTypeFields(type, existingDetails = {}) {
  if (type === 'qr_code') {
    currentQrUrl = existingDetails.image_url ?? null;
    renderQrUploadUI();
    return;
  }

  const fields = TYPE_FIELDS[type] || [];
  document.getElementById('typeFields').innerHTML = fields.map(f => `
    <div class="field">
      <label>${f.label}</label>
      <input type="text" id="detail_${f.key}" data-detail-key="${f.key}" value="${existingDetails[f.key] ?? ''}">
    </div>
  `).join('');
}

function renderQrUploadUI() {
  document.getElementById('typeFields').innerHTML = `
    <div class="field">
      <label>รูป QR Code</label>
      ${currentQrUrl
        ? `<img src="${currentQrUrl}" alt="QR Code" style="max-width:180px;width:100%;border-radius:10px;margin-bottom:8px;display:block;">`
        : `<div class="hint" style="margin-bottom:8px;">ยังไม่มีรูป QR Code</div>`
      }
      <div style="display:flex;gap:8px;">
        <button type="button" class="icon-btn" id="qrUploadBtn">${currentQrUrl ? 'เปลี่ยนรูป' : 'อัปโหลดรูป QR'}</button>
        ${currentQrUrl ? `<button type="button" class="icon-btn danger" id="qrRemoveBtn">ลบรูป</button>` : ''}
      </div>
      <input type="file" id="qrFileInput" accept="image/jpeg,image/png,image/webp" style="display:none;">
    </div>
  `;

  document.getElementById('qrUploadBtn').addEventListener('click', () => {
    document.getElementById('qrFileInput').click();
  });

  document.getElementById('qrFileInput').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const alertEl = document.getElementById('formAlert');
    try {
      const { data } = await admin.uploadPaymentQr(file);
      currentQrUrl = data.url;
      renderQrUploadUI();
    } catch (err) {
      alertEl.textContent = err.message;
      alertEl.className = 'form-alert show error';
    }
  });

  document.getElementById('qrRemoveBtn')?.addEventListener('click', () => {
    currentQrUrl = null;
    renderQrUploadUI();
  });
}

document.getElementById('fType').addEventListener('change', (e) => renderTypeFields(e.target.value));
renderTypeFields(document.getElementById('fType').value);

function collectDetails() {
  if (document.getElementById('fType').value === 'qr_code') {
    return currentQrUrl ? { image_url: currentQrUrl } : {};
  }
  const details = {};
  document.querySelectorAll('[data-detail-key]').forEach(input => {
    details[input.dataset.detailKey] = input.value.trim();
  });
  return details;
}

async function loadMethods() {
  const listEl = document.getElementById('methodList');
  try {
    const { data } = await admin.paymentMethods.list();

    if (!data.length) {
      listEl.innerHTML = `<div class="empty-state">ยังไม่มีช่องทางชำระเงิน</div>`;
      return;
    }

    const TYPE_LABEL = { promptpay: 'PromptPay', bank: 'โอนธนาคาร', truemoney: 'TrueMoney', qr_code: 'QR Code' };

    listEl.innerHTML = data.map(m => `
      <div class="method-row ${m.is_active ? '' : 'inactive'}">
        <div class="method-info">
          <div class="method-label">${m.label}</div>
          <div class="method-meta">${TYPE_LABEL[m.type] ?? m.type} · ${m.is_active ? 'เปิดใช้งาน' : 'ปิดใช้งาน'}</div>
        </div>
        <div class="row-actions">
          <button class="icon-btn" data-edit="${m.id}">แก้ไข</button>
          <button class="icon-btn" data-toggle="${m.id}" data-active="${m.is_active}">${m.is_active ? 'ปิด' : 'เปิด'}</button>
          <button class="icon-btn danger" data-delete="${m.id}">ลบ</button>
        </div>
      </div>
    `).join('');

    listEl.querySelectorAll('[data-edit]').forEach(btn => {
      btn.addEventListener('click', () => {
        const m = data.find(x => x.id === btn.dataset.edit);
        startEdit(m);
      });
    });

    listEl.querySelectorAll('[data-toggle]').forEach(btn => {
      btn.addEventListener('click', async () => {
        try {
          await admin.paymentMethods.update(btn.dataset.toggle, { is_active: btn.dataset.active !== 'true' });
          loadMethods();
        } catch (e) { alert(e.message); }
      });
    });

    listEl.querySelectorAll('[data-delete]').forEach(btn => {
      btn.addEventListener('click', async () => {
        if (!confirm('ลบช่องทางนี้?')) return;
        try {
          await admin.paymentMethods.remove(btn.dataset.delete);
          loadMethods();
        } catch (e) { alert(e.message); }
      });
    });

  } catch (e) {
    listEl.innerHTML = `<div class="empty-state">โหลดไม่สำเร็จ</div>`;
  }
}

function startEdit(m) {
  editingId = m.id;
  document.getElementById('formTitle').textContent = `แก้ไข: ${m.label}`;
  document.getElementById('fType').value = m.type;
  document.getElementById('fType').disabled = true;  // เปลี่ยนประเภทหลังสร้างไม่ได้ (field ไม่ตรงกัน)
  document.getElementById('fLabel').value = m.label;
  renderTypeFields(m.type, m.details);
  document.getElementById('saveBtn').textContent = 'บันทึกการแก้ไข';
  document.getElementById('cancelEditBtn').style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function resetForm() {
  editingId = null;
  document.getElementById('formTitle').textContent = 'เพิ่มช่องทางใหม่';
  document.getElementById('fType').disabled = false;
  document.getElementById('fType').value = 'promptpay';
  document.getElementById('fLabel').value = '';
  renderTypeFields('promptpay');
  document.getElementById('saveBtn').textContent = 'บันทึกช่องทางใหม่';
  document.getElementById('cancelEditBtn').style.display = 'none';
}

document.getElementById('cancelEditBtn').addEventListener('click', resetForm);

document.getElementById('saveBtn').addEventListener('click', async () => {
  const type    = document.getElementById('fType').value;
  const label   = document.getElementById('fLabel').value.trim();
  const details = collectDetails();
  const alertEl = document.getElementById('formAlert');
  const btn     = document.getElementById('saveBtn');

  if (!label) {
    alertEl.textContent = 'กรุณากรอกชื่อที่แสดงให้ลูกค้าเห็น';
    alertEl.className = 'form-alert show error';
    return;
  }

  btn.disabled = true; btn.textContent = 'กำลังบันทึก...';
  try {
    if (editingId) {
      await admin.paymentMethods.update(editingId, { label, details });
    } else {
      await admin.paymentMethods.create({ type, label, details });
    }
    alertEl.textContent = 'บันทึกสำเร็จ';
    alertEl.className = 'form-alert show success';
    resetForm();
    loadMethods();
  } catch (e) {
    alertEl.textContent = e.message;
    alertEl.className = 'form-alert show error';
    btn.disabled = false;
    btn.textContent = editingId ? 'บันทึกการแก้ไข' : 'บันทึกช่องทางใหม่';
    return;
  }
  btn.disabled = false;
  btn.textContent = editingId ? 'บันทึกการแก้ไข' : 'บันทึกช่องทางใหม่';
});

loadMethods();
</script>
</body>
</html>
