<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ประวัติการสั่งซื้อ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap');
  :root{--navy:#1A6BA0;--gold:#D9A330;--gold-deep:#B9821F;--ink:#1A3A52;--line:rgba(26,106,160,0.18);--muted:rgba(26,58,82,0.55);--green-go:#3F8557;--danger:#E04433;}
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{background:#81CFF0;}
  body{font-family:'IBM Plex Sans Thai',sans-serif;color:var(--ink);min-height:100vh;padding:0 0 40px;-webkit-font-smoothing:antialiased;}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:rgba(255,255,255,0.15);backdrop-filter:blur(8px);position:sticky;top:0;z-index:20;}
  .topbar img{height:32px;}
  .back-link{font-size:13px;font-weight:600;color:#fff;text-decoration:none;}
  .page-header{padding:20px 16px 14px;}
  .page-title{font-family:'Baloo 2',sans-serif;font-size:22px;font-weight:800;color:#fff;}
  .page-sub{font-size:13px;color:rgba(255,255,255,0.75);margin-top:3px;}
  .order-list{padding:0 14px;}
  .order-card{background:rgba(255,255,255,0.97);border-radius:14px;padding:15px;margin-bottom:10px;box-shadow:0 3px 12px rgba(0,40,80,0.12);border-left:4px solid transparent;}
  .order-card.pending{border-left-color:rgba(26,58,82,0.25);}
  .order-card.awaiting_review{border-left-color:var(--gold);}
  .order-card.delivered{border-left-color:var(--green-go);}
  .order-card.cancelled{border-left-color:var(--danger);}
  .order-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
  .order-meta{flex:1;min-width:0;}
  .order-id{font-size:11px;color:var(--muted);font-family:'Space Mono',monospace;margin-bottom:2px;}
  .order-date{font-size:11px;color:var(--muted);}
  .status-badge{font-size:10.5px;font-weight:700;padding:4px 10px;border-radius:12px;display:inline-flex;align-items:center;gap:3px;white-space:nowrap;flex-shrink:0;margin-left:8px;}
  .status-badge.pending{background:rgba(26,58,82,0.08);color:var(--muted);}
  .status-badge.awaiting_review{background:rgba(217,163,48,0.15);color:var(--gold-deep);}
  .status-badge.delivered{background:rgba(63,133,87,0.12);color:var(--green-go);}
  .status-badge.cancelled{background:rgba(224,68,51,0.1);color:var(--danger);}
  .order-product{font-size:14px;font-weight:700;margin-bottom:4px;}
  .order-amount{font-family:'Baloo 2',sans-serif;font-weight:800;color:var(--gold);font-size:18px;margin-bottom:12px;}
  .detail-btn{display:block;width:100%;padding:10px 0;background:var(--navy);color:#fff;border:none;border-radius:9px;font-size:13px;font-weight:700;font-family:'Baloo 2',sans-serif;text-align:center;text-decoration:none;cursor:pointer;}
  .empty-state{text-align:center;padding:70px 20px;color:rgba(255,255,255,0.8);font-size:14px;}
  .loading-state{text-align:center;padding:50px 20px;color:rgba(255,255,255,0.8);}
</style>
</head>
<body>

<div class="topbar">
  <a href="/pages/shop.html" class="back-link">← หน้าสินค้า</a>
  <img id="siteLogo" src="../images/logo-main-service1.png" alt="logo">
</div>

<div class="page-header">
  <div class="page-title">ประวัติการสั่งซื้อ</div>
  <div class="page-sub" id="countLabel">กำลังโหลด...</div>
</div>

<div class="order-list" id="orderList">
  <div class="loading-state">กำลังโหลด...</div>
</div>

<script type="module">
import { auth, orders, settings } from '../js/api.js';

settings.get().then(({ data }) => {
  if (data.logo_url) document.getElementById('siteLogo').src = data.logo_url;
}).catch(() => {});

const session = await auth.getSession();
if (!session) { window.location.href = '/pages/login.html'; }

const STATUS = {
  pending:          { label: 'รอชำระเงิน',      dot: '⏳' },
  awaiting_review:  { label: 'รอตรวจสอบสลิป',   dot: '🔍' },
  delivered:        { label: 'ส่งข้อมูลแล้ว',   dot: '✅' },
  cancelled:        { label: 'ยกเลิก',           dot: '❌' },
};

function fmtDate(iso) {
  if (!iso) return '-';
  return new Date(iso).toLocaleDateString('th-TH', { year:'numeric', month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
}

try {
  const { data } = await orders.myOrders();
  document.getElementById('countLabel').textContent = `ทั้งหมด ${data.length} รายการ`;

  if (!data.length) {
    document.getElementById('orderList').innerHTML = `<div class="empty-state">ยังไม่มีประวัติการสั่งซื้อ</div>`;
  } else {
    document.getElementById('orderList').innerHTML = data.map(o => {
      const s = STATUS[o.status] || { label: o.status, dot: '•' };
      const cta = o.status === 'pending'
        ? `<a href="/pages/checkout.html?order_id=${o.id}" class="detail-btn">ชำระเงิน →</a>`
        : `<a href="/pages/order-detail.html?id=${o.id}" class="detail-btn">ดูรายละเอียด →</a>`;
      return `
        <div class="order-card ${o.status}">
          <div class="order-top">
            <div class="order-meta">
              <div class="order-id">#${o.id.slice(0,8).toUpperCase()}</div>
              <div class="order-date">${fmtDate(o.created_at)}</div>
            </div>
            <span class="status-badge ${o.status}">${s.dot} ${s.label}</span>
          </div>
          <div class="order-product">${o.product_label}</div>
          <div class="order-amount">฿${Number(o.amount).toLocaleString()}</div>
          ${cta}
        </div>
      `;
    }).join('');
  }
} catch (e) {
  document.getElementById('orderList').innerHTML = `<div class="empty-state">โหลดข้อมูลไม่สำเร็จ</div>`;
}
</script>
</body>
</html>
