<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ประวัติออเดอร์ — Mayor Service</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Sarabun',sans-serif;background:#0f1923;color:#fff;min-height:100vh}
  nav{background:#1a2a3a;padding:14px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #1e3a5f}
  .nav-logo{font-size:18px;font-weight:700}
  .nav-logo span{color:#f59e0b}
  .nav-right{display:flex;gap:10px}
  .nav-link{color:#9ca3af;text-decoration:none;font-size:14px;padding:6px 12px;border-radius:8px}
  .nav-link:hover,.nav-link.active{color:#fff;background:#1e3a5f}
  .btn-sm{padding:7px 16px;background:#374151;color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer}
  main{padding:20px}
  h1{font-size:20px;font-weight:700;margin-bottom:16px}
  .order-card{background:#1a2a3a;border-radius:14px;padding:16px;margin-bottom:12px;cursor:pointer;transition:.2s;border:1.5px solid transparent}
  .order-card:hover{border-color:#1e3a5f}
  .order-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .order-id{font-size:12px;color:#6b7280}
  .badge{padding:4px 10px;border-radius:10px;font-size:12px;font-weight:600}
  .badge.pending{background:#1e3a5f;color:#60a5fa}
  .badge.awaiting{background:#451a03;color:#fb923c}
  .badge.delivered{background:#052e16;color:#86efac}
  .badge.cancelled{background:#1c1917;color:#78716c}
  .order-name{font-size:15px;font-weight:600;margin-bottom:4px}
  .order-price{font-size:18px;font-weight:700;color:#f59e0b}
  .order-date{font-size:12px;color:#6b7280;margin-top:4px}
  .empty{text-align:center;color:#6b7280;padding:60px 20px;font-size:15px}
  .loading{text-align:center;color:#6b7280;padding:60px 20px}
  .spinner{width:32px;height:32px;border:3px solid #374151;border-top-color:#1d4ed8;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* Credential modal */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:flex-end;justify-content:center;z-index:200}
  .overlay.hidden{display:none}
  .modal{background:#1a2a3a;border-radius:20px 20px 0 0;width:100%;max-width:480px;padding:24px 20px 40px}
  .modal-handle{width:40px;height:4px;background:#374151;border-radius:2px;margin:0 auto 20px}
  .cred-box{background:#0f1923;border-radius:10px;padding:16px;font-family:monospace;font-size:14px;word-break:break-all;color:#86efac;margin:12px 0}
  .btn{width:100%;padding:14px;background:#1d4ed8;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
  .btn-close{width:100%;padding:12px;background:transparent;color:#9ca3af;border:1.5px solid #374151;border-radius:12px;font-size:14px;cursor:pointer;margin-top:8px}
</style>
</head>
<body>
<nav>
  <div class="nav-logo">MAYOR <span>SERVICE</span></div>
  <div class="nav-right">
    <a href="/pages/shop.html" class="nav-link">ร้านค้า</a>
    <a href="/pages/history.html" class="nav-link active">ประวัติ</a>
    <button class="btn-sm" onclick="import('../js/core/auth.js').then(m=>m.logout())">ออก</button>
  </div>
</nav>
<main>
  <h1>ประวัติการสั่งซื้อ</h1>
  <div id="content"><div class="loading"><div class="spinner"></div>กำลังโหลด...</div></div>
</main>

<!-- Credential modal -->
<div class="overlay hidden" id="credOverlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <div id="credContent"></div>
  </div>
</div>

<script type="module">
import { order } from '../js/core/api.js';
import { requireAuth } from '../js/core/auth.js';

await requireAuth();

const ENCRYPT_KEY = '__ENCRYPT_KEY__'; // inject ผ่าน env เหมือนกัน

const statusLabel = {
  pending:              { text: 'รอชำระเงิน',      cls: 'pending' },
  awaiting_slip_review: { text: 'รอตรวจสลิป',      cls: 'awaiting' },
  paid:                 { text: 'ชำระแล้ว',         cls: 'awaiting' },
  delivered:            { text: 'ส่งไอดีแล้ว',     cls: 'delivered' },
  cancelled:            { text: 'ยกเลิก',           cls: 'cancelled' }
};

const res = await order.getMyOrders();
const content = document.getElementById('content');

if (!res.success) {
  content.innerHTML = '<div class="empty">เกิดข้อผิดพลาด: ' + res.error + '</div>';
} else if (res.data.length === 0) {
  content.innerHTML = '<div class="empty">ยังไม่มีออเดอร์ <br><br><a href="/pages/shop.html" style="color:#60a5fa">ไปเลือกสินค้า →</a></div>';
} else {
  const s = statusLabel;
  content.innerHTML = res.data.map(o => {
    const st = s[o.status] || { text: o.status, cls: 'pending' };
    const item = o.order_items?.[0];
    const date = new Date(o.created_at).toLocaleDateString('th-TH', { day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
    return `
      <div class="order-card" onclick="openOrder('${o.id}','${o.status}')">
        <div class="order-top">
          <span class="order-id">#${o.id.slice(0,8).toUpperCase()}</span>
          <span class="badge ${st.cls}">${st.text}</span>
        </div>
        <div class="order-name">${item?.product_name || 'สินค้า'}</div>
        <div class="order-price">${Number(o.total_amount).toLocaleString('th-TH')} บาท</div>
        <div class="order-date">${date}</div>
        ${o.status === 'pending' ? `<a href="/pages/checkout.html?order=${o.id}" style="display:block;margin-top:10px;text-align:center;padding:8px;background:#1d4ed8;border-radius:8px;font-size:13px;color:#fff;text-decoration:none" onclick="event.stopPropagation()">อัปโหลดสลิป</a>` : ''}
        ${o.reject_reason ? `<div style="margin-top:8px;font-size:12px;color:#fca5a5">เหตุผล: ${o.reject_reason}</div>` : ''}
      </div>
    `;
  }).join('');
}

window.openOrder = async (orderId, status) => {
  if (status !== 'delivered') return;
  const overlay = document.getElementById('credOverlay');
  const credContent = document.getElementById('credContent');
  credContent.innerHTML = '<div style="text-align:center;color:#6b7280;padding:20px">กำลังโหลด...</div>';
  overlay.classList.remove('hidden');

  const res = await order.getMyCredential(orderId, ENCRYPT_KEY);
  if (!res.success || !res.credential) {
    credContent.innerHTML = `<p style="color:#fca5a5">โหลดข้อมูลไม่สำเร็จ</p><button class="btn-close" onclick="document.getElementById('credOverlay').classList.add('hidden')">ปิด</button>`;
    return;
  }
  credContent.innerHTML = `
    <h2 style="margin-bottom:8px">ข้อมูลไอดีของคุณ</h2>
    <p style="font-size:13px;color:#9ca3af;margin-bottom:12px">คัดลอกข้อมูลด้านล่างไปใช้เข้าเกม</p>
    <div class="cred-box">${res.credential}</div>
    <button class="btn" onclick="navigator.clipboard.writeText('${res.credential}').then(()=>alert('คัดลอกแล้ว'))">คัดลอก</button>
    <button class="btn-close" onclick="document.getElementById('credOverlay').classList.add('hidden')">ปิด</button>
  `;
};
</script>
</body>
</html>
