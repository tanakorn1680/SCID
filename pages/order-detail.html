<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>รายละเอียดออเดอร์</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

  :root{
    --navy:#1A6BA0; --sky:#2196C9; --gold:#D9A330; --gold-deep:#B9821F;
    --ink:#1A3A52; --line:rgba(26,106,160,0.18); --muted:rgba(26,58,82,0.55);
    --green-go:#3F8557; --danger:#E04433;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ background:#81CFF0; }
  body{
    font-family:'IBM Plex Sans Thai',sans-serif;
    color:var(--ink); min-height:100vh; padding:0 0 40px;
    -webkit-font-smoothing:antialiased;
  }

  /* ── Topbar ── */
  .topbar{
    display:flex; align-items:center; gap:10px;
    padding:14px 16px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
    position:sticky; top:0; z-index:20;
  }
  .back-btn{ color:#fff; font-size:13px; font-weight:600; text-decoration:none; }
  .topbar-title{
    font-family:'Baloo 2',sans-serif; font-weight:700; font-size:15px; color:#fff; flex:1;
  }

  .page-body{ padding:14px; display:flex; flex-direction:column; gap:12px; }

  /* ── Card base ── */
  .section-card{
    background:rgba(255,255,255,0.97); border-radius:14px; padding:16px;
    box-shadow:0 3px 12px rgba(0,40,80,0.12);
  }
  .section-title{
    font-size:12.5px; font-weight:700; color:var(--muted);
    text-transform:uppercase; letter-spacing:.5px; margin-bottom:12px;
  }

  /* ── Status badge ── */
  .status-badge-lg{
    display:inline-flex; align-items:center; gap:6px;
    font-size:13px; font-weight:700; padding:6px 14px; border-radius:20px;
    margin-bottom:14px;
  }
  .status-badge-lg.pending             { background:rgba(26,58,82,0.08); color:var(--muted); }
  .status-badge-lg.awaiting_slip_review{ background:rgba(217,163,48,0.15); color:var(--gold-deep); }
  .status-badge-lg.paid                { background:rgba(26,106,160,0.12); color:var(--navy); }
  .status-badge-lg.delivered           { background:rgba(63,133,87,0.12); color:var(--green-go); }
  .status-badge-lg.cancelled,
  .status-badge-lg.refunded            { background:rgba(224,68,51,0.1); color:var(--danger); }

  /* ── Detail rows ── */
  .detail-row{
    display:flex; justify-content:space-between; align-items:baseline;
    padding:9px 0; border-bottom:1px dotted var(--line);
    font-size:13.5px;
  }
  .detail-row:last-child{ border-bottom:none; }
  .detail-row .lbl{ color:var(--muted); font-size:12.5px; flex-shrink:0; margin-right:12px; }
  .detail-row .val{ font-weight:600; text-align:right; }

  .order-id-full{
    font-family:'Space Mono',monospace; font-size:11px; color:var(--muted);
    word-break:break-all; margin-bottom:10px;
  }

  /* ── Product summary row ── */
  .product-row{
    display:flex; gap:12px; align-items:center; padding-bottom:12px;
    margin-bottom:12px; border-bottom:1px dashed var(--line);
  }
  .product-img{
    width:56px; height:56px; border-radius:10px; object-fit:cover; flex-shrink:0;
    background:linear-gradient(135deg,#E8F2FA,#D4E9F7);
  }
  .product-name{ font-size:14px; font-weight:700; }
  .product-price{
    font-family:'Baloo 2',sans-serif; font-weight:800; color:var(--gold); font-size:16px;
  }

  /* ── Slip image ── */
  .slip-wrap{
    background:rgba(26,106,160,0.04); border-radius:10px; padding:12px;
    text-align:center;
  }
  .slip-img{
    width:100%; max-height:240px; object-fit:contain; border-radius:8px;
    cursor:zoom-in;
  }
  .slip-time{ font-size:11.5px; color:var(--muted); margin-top:8px; }
  .no-slip{ color:var(--muted); font-size:13px; padding:20px 0; }

  /* ── Status timeline ── */
  .timeline{ display:flex; flex-direction:column; gap:0; }
  .timeline-item{
    display:flex; gap:12px; align-items:flex-start; position:relative; padding-bottom:14px;
  }
  .timeline-item:last-child{ padding-bottom:0; }
  .timeline-item::before{
    content:''; position:absolute; left:10px; top:22px; bottom:0;
    width:2px; background:var(--line);
  }
  .timeline-item:last-child::before{ display:none; }
  .tl-dot{
    width:22px; height:22px; border-radius:50%; flex-shrink:0; margin-top:1px;
    display:flex; align-items:center; justify-content:center; font-size:11px;
    border:2px solid var(--line); background:#fff;
  }
  .tl-dot.done{ background:var(--green-go); border-color:var(--green-go); color:#fff; }
  .tl-dot.current{ background:var(--gold); border-color:var(--gold); color:#fff; }
  .tl-dot.waiting{ background:#fff; border-color:var(--line); }
  .tl-content{ flex:1; }
  .tl-label{ font-size:13px; font-weight:600; }
  .tl-time{ font-size:11.5px; color:var(--muted); margin-top:2px; }
  .tl-waiting-msg{
    font-size:12px; color:var(--muted); font-style:italic; margin-top:2px;
  }

  /* ── Credential box (ไอดีที่ได้รับ) ── */
  .credential-card{
    background:linear-gradient(135deg, #0E4C7A 0%, #1A6BA0 100%);
    border-radius:14px; padding:16px; color:#fff;
  }
  .credential-header{
    display:flex; align-items:center; gap:8px; margin-bottom:14px;
  }
  .credential-icon{ font-size:20px; }
  .credential-title-text{ font-family:'Baloo 2',sans-serif; font-size:15px; font-weight:700; }

  .cred-row{
    background:rgba(255,255,255,0.1); border-radius:10px; padding:12px 14px;
    margin-bottom:8px;
  }
  .cred-row:last-of-type{ margin-bottom:0; }
  .cred-label{ font-size:11px; color:rgba(255,255,255,0.6); margin-bottom:5px; font-weight:600; }
  .cred-value-row{ display:flex; align-items:center; justify-content:space-between; gap:8px; }
  .cred-value{
    font-family:'Space Mono',monospace; font-size:13.5px; font-weight:700; color:#fff;
    word-break:break-all; flex:1;
  }
  .cred-value.masked{ filter:blur(5px); user-select:none; transition:filter .2s ease; }

  .cred-actions{ display:flex; gap:6px; flex-shrink:0; }
  .cred-btn{
    padding:5px 10px; background:rgba(255,255,255,0.2); border:none; border-radius:7px;
    color:#fff; font-size:11px; font-weight:700; cursor:pointer; white-space:nowrap;
  }
  .cred-btn:active{ background:rgba(255,255,255,0.35); }

  .delivered-time{
    font-size:11px; color:rgba(255,255,255,0.5); text-align:center; margin-top:12px;
  }

  /* ── Pending message ── */
  .pending-msg{
    background:rgba(217,163,48,0.08); border:1px solid rgba(217,163,48,0.25);
    border-radius:10px; padding:14px 16px; text-align:center;
  }
  .pending-msg .icon{ font-size:24px; margin-bottom:6px; }
  .pending-msg .title{ font-size:14px; font-weight:700; color:var(--gold-deep); margin-bottom:4px; }
  .pending-msg .sub{ font-size:12.5px; color:var(--muted); }

  /* ── Lightbox ── */
  .lightbox{
    display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9);
    z-index:100; align-items:center; justify-content:center; padding:20px;
  }
  .lightbox.show{ display:flex; }
  .lightbox img{ max-width:100%; max-height:100%; border-radius:8px; }

  .skeleton{ text-align:center; padding:60px 20px; color:rgba(255,255,255,0.8); }

  @media (max-width: 480px){
    .pd-price{ font-size: 22px; }
    .cred-value{ font-size: 11.5px; }
    .cred-btn { font-size: 10px; padding: 4px 7px; }
    .section-card{ padding: 13px; }
  }
</style>
</head>
<body>

<div class="topbar">
  <a href="/pages/history.html" class="back-btn">←</a>
  <div class="topbar-title">รายละเอียดออเดอร์</div>
</div>

<div class="page-body" id="pageBody">
  <div class="skeleton">กำลังโหลด...</div>
</div>

<!-- Lightbox สำหรับซูมรูปสลิป -->
<div class="lightbox" id="lightbox">
  <img id="lightboxImg" src="" alt="สลิป">
</div>

<script type="module">
import { requireAuth } from '../js/core/router.js';
import { setupSessionExpiryHandler } from '../js/core/auth.js';
setupSessionExpiryHandler();
import { order } from '../js/core/api.js';
import { supabase } from '../js/config/supabase.js';

const STATUS = {
  pending:               { label:'รอชำระเงิน',       dot:'⏳' },
  awaiting_slip_review:  { label:'รอตรวจสอบสลิป',   dot:'🔍' },
  paid:                  { label:'รอส่งไอดี',         dot:'⏱' },
  delivered:             { label:'ส่งข้อมูลแล้ว',    dot:'✅' },
  cancelled:             { label:'ยกเลิก',            dot:'❌' },
  refunded:              { label:'คืนเงินแล้ว',       dot:'↩' }
};

const params = new URLSearchParams(window.location.search);
const orderId = params.get('id');

function esc(str){ const d=document.createElement('div'); d.textContent=str??''; return d.innerHTML; }
function fmtDate(iso){
  if(!iso) return null;
  return new Date(iso).toLocaleString('th-TH',{
    year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'
  });
}

// ── Render timeline ──────────────────────────────────────────────
function buildTimeline(o) {
  const steps = [
    {
      key:'created',
      label:'สร้างออเดอร์',
      time: fmtDate(o.created_at),
      done: true
    },
    {
      key:'slip',
      label:'ส่งสลิปการโอนเงิน',
      time: fmtDate(o.slip_submitted_at),
      done: !!o.slip_submitted_at
    },
    {
      key:'review',
      label:'แอดมินยืนยันการชำระเงิน',
      time: fmtDate(o.reviewed_at),
      done: !!o.reviewed_at && (o.status === 'paid' || o.status === 'delivered'),
      waitMsg: 'กำลังรอแอดมินตรวจสอบ…'
    },
    {
      key:'deliver',
      label:'ส่งข้อมูลไอดีให้ลูกค้า',
      time: null, // ดึงจาก credential ถ้ามี
      done: o.status === 'delivered',
      waitMsg: 'รอส่งข้อมูลไอดี…'
    }
  ];

  const isCancelled = o.status === 'cancelled' || o.status === 'refunded';

  return `
    <div class="timeline">
      ${steps.map((step, i) => {
        const isCurrentNotDone = !step.done && !isCancelled && steps.slice(0,i).every(s=>s.done);
        const dotClass = step.done ? 'done' : (isCurrentNotDone ? 'current' : 'waiting');
        const dotSymbol = step.done ? '✓' : (isCurrentNotDone ? '…' : '');
        return `
          <div class="timeline-item">
            <div class="tl-dot ${dotClass}">${dotSymbol}</div>
            <div class="tl-content">
              <div class="tl-label" style="${step.done?'':'color:var(--muted)'}">${step.label}</div>
              ${step.time
                ? `<div class="tl-time">${step.time}</div>`
                : (isCurrentNotDone && step.waitMsg
                  ? `<div class="tl-waiting-msg">${step.waitMsg}</div>`
                  : '')}
            </div>
          </div>
        `;
      }).join('')}
      ${isCancelled ? `
        <div class="timeline-item">
          <div class="tl-dot" style="background:var(--danger);border-color:var(--danger);color:#fff;">✕</div>
          <div class="tl-content">
            <div class="tl-label" style="color:var(--danger);">${STATUS[o.status]?.label||o.status}</div>
            ${o.reject_reason ? `<div class="tl-time" style="color:var(--danger);">${esc(o.reject_reason)}</div>` : ''}
          </div>
        </div>
      ` : ''}
    </div>
  `;
}

// ── Render credential box ────────────────────────────────────────
async function renderCredential(orderId) {
  const result = await order.getDeliveredCredential(orderId);

  if (!result.success || !result.data) {
    return `
      <div class="pending-msg">
        <div class="icon">⏳</div>
        <div class="title">กำลังรอแอดมินตรวจสอบ</div>
        <div class="sub">เมื่อได้รับการยืนยัน ไอดีจะปรากฏที่นี่ทันที</div>
      </div>
    `;
  }

  const { gmail, password, delivered_at } = result.data;
  const deliveredTime = fmtDate(delivered_at);

  return `
    <div class="credential-card" id="credCard">
      <div class="credential-header">
        <span class="credential-icon">🔑</span>
        <span class="credential-title-text">ข้อมูลไอดีของคุณ</span>
      </div>

      <div class="cred-row">
        <div class="cred-label">Gmail</div>
        <div class="cred-value-row">
          <div class="cred-value" id="gmailVal">${esc(gmail)}</div>
          <div class="cred-actions">
            <button class="cred-btn" id="copyGmailBtn">คัดลอก</button>
          </div>
        </div>
      </div>

      <div class="cred-row">
        <div class="cred-label">รหัสผ่าน Gmail</div>
        <div class="cred-value-row">
          <div class="cred-value masked" id="pwVal">${esc(password)}</div>
          <div class="cred-actions">
            <button class="cred-btn" id="togglePwBtn">แสดง</button>
            <button class="cred-btn" id="copyPwBtn">คัดลอก</button>
          </div>
        </div>
      </div>

      ${deliveredTime ? `<div class="delivered-time">ส่งข้อมูลเมื่อ ${deliveredTime}</div>` : ''}
    </div>
  `;
}

// ── Render full page ─────────────────────────────────────────────
async function renderPage(o) {
  const pageBody = document.getElementById('pageBody');
  const productName = o.order_items?.[0]?.products?.name || '-';
  const productImg  = o.order_items?.[0]?.products?.image_url || '';
  const productPrice = Number(o.order_items?.[0]?.unit_price || o.total_amount).toLocaleString();
  const s = STATUS[o.status] || { label:o.status, dot:'•' };

  // Render credential box (async) — await ก่อนใส่ใน template ได้เลยเพราะอยู่ใน async function
  const credHtml = (o.status === 'delivered')
    ? await renderCredential(o.id)
    : `<div class="pending-msg">
         <div class="icon">⏳</div>
         <div class="title">กำลังรอแอดมินตรวจสอบ</div>
         <div class="sub">เมื่อได้รับการยืนยัน ไอดีจะปรากฏที่นี่ทันที</div>
       </div>`;

  // ── generate signed URL สดใหม่จาก raw path ──────────────────────────────
  // slip_url ใน DB เป็น path ดิบ เช่น "{user_id}/{order_id}.jpg"
  // สร้าง signed URL ใหม่ทุกครั้งที่ renderPage ถูกเรียก (อายุ 10 นาที)
  // รองรับทั้งข้อมูลใหม่ (raw path) และข้อมูลเก่า (signed URL เดิมที่บันทึกก่อน fix)
  let freshSlipUrl = null;
  if (o.slip_url) {
    const isRawPath = !o.slip_url.startsWith('http');
    if (isRawPath) {
      // กรณีใหม่: raw path → สร้าง signed URL ใหม่
      const { data: signedData, error: signedError } = await supabase.storage
        .from('payment-slips')
        .createSignedUrl(o.slip_url, 60 * 10); // 10 นาที
      if (!signedError && signedData?.signedUrl) {
        freshSlipUrl = signedData.signedUrl;
      }
    } else {
      // กรณีเก่า (legacy): ใช้ URL เดิม — อาจหมดอายุแล้ว แต่ไม่มี raw path ให้ re-sign
      // error handler ด้านล่างจะจัดการกรณีนี้
      freshSlipUrl = o.slip_url;
    }
  }

  const slipHtml = freshSlipUrl
    ? `<div class="slip-wrap">
         <img class="slip-img" src="${freshSlipUrl}" alt="สลิปการโอนเงิน" id="slipImg">
         ${o.slip_submitted_at
           ? `<div class="slip-time">ส่งสลิปเมื่อ ${fmtDate(o.slip_submitted_at)}</div>`
           : ''}
       </div>`
    : o.slip_url
      ? `<div class="slip-wrap">
           <div style="text-align:center;padding:20px;color:var(--muted);font-size:13px;">
             ไม่สามารถโหลดรูปสลิปได้ชั่วคราว กรุณาลองรีเฟรชหน้า
           </div>
         </div>`
      : `<div class="slip-wrap"><div class="no-slip">ยังไม่มีสลิป</div></div>`;

  pageBody.innerHTML = `
    <!-- สถานะ -->
    <div class="section-card">
      <span class="status-badge-lg ${o.status}">${esc(s.dot)} ${esc(s.label)}</span>
      <div class="order-id-full">Order: ${o.id}</div>

      <!-- สินค้า -->
      <div class="product-row">
        ${productImg
          ? `<img class="product-img" src="${productImg}" alt="${esc(productName)}" onerror="this.style.display='none'">`
          : '<div class="product-img"></div>'}
        <div>
          <div class="product-name">${esc(productName)}</div>
          <div class="product-price">฿${productPrice}</div>
        </div>
      </div>

      <!-- รายละเอียดวันที่ -->
      <div class="detail-row">
        <span class="lbl">วันที่สั่งซื้อ</span>
        <span class="val">${fmtDate(o.created_at)}</span>
      </div>
      <div class="detail-row">
        <span class="lbl">วันที่ส่งสลิป</span>
        <span class="val">${fmtDate(o.slip_submitted_at) || '-'}</span>
      </div>
      <div class="detail-row">
        <span class="lbl">วันที่ส่งไอดี</span>
        <span class="val" id="deliveredDateVal">${(o.status==='delivered' && o.reviewed_at) ? fmtDate(o.reviewed_at) : '-'}</span>
      </div>
    </div>

    <!-- ขั้นตอน/Timeline -->
    <div class="section-card">
      <div class="section-title">สถานะออเดอร์</div>
      ${buildTimeline(o)}
    </div>

    <!-- ไอดีที่ได้รับ / pending -->
    <div id="credSection">
      ${credHtml}
    </div>

    <!-- สลิปการโอน -->
    ${o.slip_url || o.status === 'awaiting_slip_review' || o.status === 'delivered' ? `
      <div class="section-card">
        <div class="section-title">สลิปการโอนเงิน</div>
        ${slipHtml}
      </div>` : ''}
  `;

  // ── ผูก listeners ──
  const slipImgEl2 = document.getElementById('slipImg');
  slipImgEl2?.addEventListener('click', () => {
    document.getElementById('lightboxImg').src = freshSlipUrl || '';
    document.getElementById('lightbox').classList.add('show');
  });
  // ลิงก์รูปสลิปโหลดไม่ขึ้น (เช่น legacy signed URL หมดอายุก่อน fix) — แจ้งชัดเจน
  slipImgEl2?.addEventListener('error', () => {
    slipImgEl2.outerHTML = `<div style="text-align:center;padding:20px;color:var(--muted);font-size:13px;">
      โหลดรูปสลิปไม่สำเร็จ — ติดต่อแอดมินหากต้องใช้เป็นหลักฐาน
    </div>`;
  }, { once: true });


  // Copy Gmail
  const copyGmailBtn = document.getElementById('copyGmailBtn');
  copyGmailBtn?.addEventListener('click', async () => {
    const val = (document.getElementById('gmailVal')?.textContent || '').trim();
    await navigator.clipboard.writeText(val);
    copyGmailBtn.textContent = 'คัดลอกแล้ว!';
    setTimeout(() => { copyGmailBtn.textContent = 'คัดลอก'; }, 1500);
  });

  // Toggle show/hide password — รหัสผ่านซ่อนไว้ก่อน (masked) ตามข้อกำหนด Phase 5
  const toggleBtn = document.getElementById('togglePwBtn');
  const pwEl = document.getElementById('pwVal');
  let pwVisible = false;
  toggleBtn?.addEventListener('click', () => {
    pwVisible = !pwVisible;
    pwEl.classList.toggle('masked', !pwVisible);
    toggleBtn.textContent = pwVisible ? 'ซ่อน' : 'แสดง';
  });

  // Copy password
  const copyPwBtn = document.getElementById('copyPwBtn');
  copyPwBtn?.addEventListener('click', async () => {
    const val = document.getElementById('pwVal')?.textContent || '';
    await navigator.clipboard.writeText(val.trim());
    copyPwBtn.textContent = 'คัดลอกแล้ว!';
    setTimeout(() => { copyPwBtn.textContent = 'คัดลอก'; }, 1500);
  });
}

// ── Real-time: อัปเดตหน้าเมื่อสถานะเปลี่ยน ──────────────────────
// subscribe เฉพาะ order นี้ (filter ด้วย id) — ไม่ subscribe ทั้ง table
let realtimeChannel = null;

function subscribeThisOrder() {
  realtimeChannel = supabase
    .channel(`order-detail-${orderId}`)
    .on('postgres_changes',
      { event:'UPDATE', schema:'public', table:'orders', filter:`id=eq.${orderId}` },
      async (payload) => {
        // สถานะเปลี่ยน → reload หน้าใหม่เพื่อแสดงข้อมูลล่าสุด
        // (รวมถึงกรณี delivered ที่ต้อง fetch credential เพิ่ม)
        const result = await order.getMyOrderDetail(orderId);
        if(result.success && result.data) await renderPage(result.data);
      }
    )
    .subscribe();
}

window.addEventListener('beforeunload', () => {
  if(realtimeChannel) supabase.removeChannel(realtimeChannel);
});

// ── Lightbox ─────────────────────────────────────────────────────
document.getElementById('lightbox').addEventListener('click', () => {
  document.getElementById('lightbox').classList.remove('show');
});

// ── Init ─────────────────────────────────────────────────────────

// ── Global error display helper ──────────────────────────────────────
function showFatalError(msg) {
  const wrap = document.getElementById('pageBody') || document.getElementById('orderList')
             || document.getElementById('productGrid') || document.getElementById('checkoutWrap')
             || document.getElementById('orderGrid') || document.getElementById('logList')
             || document.getElementById('tableBody')?.closest('div') || document.body;
  if (wrap) wrap.innerHTML = `
    <div style="text-align:center;padding:50px 20px;color:rgba(26,58,82,0.6);">
      <div style="font-size:32px;margin-bottom:12px;">⚠️</div>
      <div style="font-size:14px;font-weight:600;">${msg}</div>
    </div>`;
}
async function init() {
  const session = await requireAuth();
  if(!session) return;

  if(!orderId) {
    document.getElementById('pageBody').innerHTML = `<div class="skeleton">ไม่พบ Order ID</div>`;
    return;
  }

  const result = await order.getMyOrderDetail(orderId);

  if(!result.success || !result.data) {
    document.getElementById('pageBody').innerHTML = `<div class="skeleton">ไม่พบออเดอร์นี้หรือไม่มีสิทธิ์เข้าถึง</div>`;
    return;
  }

  await renderPage(result.data);
  subscribeThisOrder();
}

try {
  init();
} catch (err) {
  console.error('Init error:', err);
  showFatalError('โหลดข้อมูลไม่สำเร็จ กรุณาลองรีเฟรชหน้าเว็บ');
}
</script>

</html>
