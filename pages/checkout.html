<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ชำระเงิน — Mayor Service</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Sarabun',sans-serif;background:#0f1923;color:#fff;min-height:100vh;padding:20px}
  .back{color:#6b7280;font-size:14px;text-decoration:none;display:inline-flex;align-items:center;gap:6px;margin-bottom:20px}
  .back:hover{color:#fff}
  h1{font-size:20px;font-weight:700;margin-bottom:20px}
  .card{background:#1a2a3a;border-radius:14px;padding:20px;margin-bottom:16px}
  .card h2{font-size:14px;color:#9ca3af;margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px}
  .info-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #1e3a5f;font-size:14px}
  .info-row:last-child{border:none}
  .info-row .val{font-weight:600}
  .timer{text-align:center;padding:16px;background:#0f2744;border-radius:10px;margin-bottom:16px}
  .timer-label{font-size:12px;color:#6b7280;margin-bottom:4px}
  .timer-val{font-size:28px;font-weight:700;color:#f59e0b;font-variant-numeric:tabular-nums}
  .timer-val.urgent{color:#ef4444}
  .upload-area{border:2px dashed #374151;border-radius:12px;padding:32px 20px;text-align:center;cursor:pointer;transition:.2s;margin-bottom:16px}
  .upload-area:hover,.upload-area.dragover{border-color:#1d4ed8;background:#0f2744}
  .upload-area .icon{font-size:40px;margin-bottom:8px}
  .upload-area p{color:#9ca3af;font-size:14px}
  .upload-area .hint{font-size:12px;color:#6b7280;margin-top:4px}
  #fileInput{display:none}
  .preview{width:100%;border-radius:10px;margin-bottom:12px;max-height:200px;object-fit:cover}
  .btn{width:100%;padding:15px;background:#1d4ed8;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;transition:.2s}
  .btn:hover{background:#1e40af}
  .btn:disabled{background:#374151;cursor:not-allowed}
  .msg{padding:10px 14px;border-radius:8px;font-size:13px;margin-top:12px;display:none}
  .msg.error{background:#450a0a;color:#fca5a5;display:block}
  .msg.success{background:#052e16;color:#86efac;display:block}
  .expired{text-align:center;padding:40px 20px;color:#fca5a5}
  .expired h2{font-size:18px;margin-bottom:8px}
  .expired p{font-size:14px;color:#6b7280;margin-bottom:20px}
</style>
</head>
<body>
<a href="/pages/shop.html" class="back">← กลับร้านค้า</a>
<h1>ชำระเงิน</h1>
<div id="pageContent">
  <div style="text-align:center;color:#6b7280;padding:60px 0">กำลังโหลด...</div>
</div>

<script type="module">
import { order } from '../js/core/api.js';
import { requireAuth, getProfile } from '../js/core/auth.js';
import { supabase } from '../js/config/supabase.js';

const ok = await requireAuth();
if (!ok) throw new Error('not authed');

const params = new URLSearchParams(location.search);
const orderId = params.get('order');
if (!orderId) { window.location.href = '/pages/shop.html'; throw new Error(); }

// ดึงข้อมูล order
const { data: orderData, error } = await supabase
  .from('orders')
  .select('*, order_items(product_name, price)')
  .eq('id', orderId)
  .single();

if (error || !orderData) {
  document.getElementById('pageContent').innerHTML = '<div class="expired"><h2>ไม่พบออเดอร์</h2><p>ออเดอร์นี้ไม่มีอยู่</p><a href="/pages/shop.html"><button class="btn">กลับร้านค้า</button></a></div>';
  throw new Error();
}

if (orderData.status !== 'pending') {
  window.location.href = '/pages/history.html';
  throw new Error();
}

// countdown timer
const expiresAt = new Date(orderData.reservation_expires_at);
let timerInterval;

function renderPage() {
  const item = orderData.order_items?.[0];
  document.getElementById('pageContent').innerHTML = `
    <div class="timer">
      <div class="timer-label">เวลาที่เหลือในการชำระเงิน</div>
      <div class="timer-val" id="timerVal">--:--</div>
    </div>
    <div class="card">
      <h2>รายการสั่งซื้อ</h2>
      <div class="info-row"><span>${item?.product_name || 'สินค้า'}</span><span class="val">${Number(item?.price || 0).toLocaleString('th-TH')} บาท</span></div>
      <div class="info-row"><span>Order ID</span><span class="val" style="font-size:11px;color:#6b7280">${orderId.slice(0,8)}...</span></div>
    </div>
    <div class="card">
      <h2>อัปโหลดหลักฐานการโอน</h2>
      <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
        <div class="icon">📸</div>
        <p>แตะเพื่อเลือกรูปสลิป</p>
        <div class="hint">รองรับ JPG, PNG, WEBP (ไม่เกิน 5MB)</div>
      </div>
      <input type="file" id="fileInput" accept="image/*" onchange="onFileSelect(event)">
      <img id="previewImg" class="preview" style="display:none">
      <button class="btn" id="btnSubmit" onclick="doSubmit()" disabled>ส่งสลิป</button>
      <div class="msg" id="msg"></div>
    </div>
  `;
  startTimer();
}

function startTimer() {
  function tick() {
    const diff = expiresAt - Date.now();
    const el = document.getElementById('timerVal');
    if (!el) return;
    if (diff <= 0) {
      clearInterval(timerInterval);
      el.textContent = '00:00';
      el.className = 'timer-val urgent';
      document.getElementById('btnSubmit').disabled = true;
      return;
    }
    const m = Math.floor(diff / 60000).toString().padStart(2, '0');
    const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
    el.textContent = m + ':' + s;
    if (diff < 120000) el.className = 'timer-val urgent';
  }
  tick();
  timerInterval = setInterval(tick, 1000);
}

window.onFileSelect = (e) => {
  const file = e.target.files[0];
  if (!file) return;
  if (file.size > 5 * 1024 * 1024) {
    showMsg('ไฟล์ใหญ่เกิน 5MB', 'error'); return;
  }
  const reader = new FileReader();
  reader.onload = ev => {
    const img = document.getElementById('previewImg');
    img.src = ev.target.result;
    img.style.display = '';
    document.getElementById('uploadArea').style.display = 'none';
    document.getElementById('btnSubmit').disabled = false;
  };
  reader.readAsDataURL(file);
};

window.doSubmit = async () => {
  const file = document.getElementById('fileInput').files[0];
  if (!file) return;
  const btn = document.getElementById('btnSubmit');
  btn.disabled = true;
  btn.textContent = 'กำลังส่ง...';
  showMsg('', '');

  const res = await order.submitSlip(orderId, file);
  if (!res.success) {
    showMsg(res.error, 'error');
    btn.disabled = false;
    btn.textContent = 'ส่งสลิป';
    return;
  }
  showMsg('ส่งสลิปสำเร็จ! กำลังตรวจสอบ...', 'success');
  setTimeout(() => { window.location.href = '/pages/history.html'; }, 1500);
};

function showMsg(text, type) {
  const el = document.getElementById('msg');
  if (!el) return;
  el.textContent = text;
  el.className = 'msg' + (type ? ' ' + type : '');
}

renderPage();
</script>
</body>
</html>
