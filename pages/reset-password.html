<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ตั้งรหัสผ่านใหม่</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap');
  :root{--paper:#FBF8F1;--navy:#1A6BA0;--sky:#2196C9;--gold:#D9A330;--ink:#1A3A52;--muted:rgba(26,58,82,0.55);--line:rgba(26,106,160,0.18);--green-go:#3F8557;--danger:#E04433;--card:rgba(255,255,255,0.95);}
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{background:#81CFF0;}
  body{font-family:'IBM Plex Sans Thai',sans-serif;color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px 14px;-webkit-font-smoothing:antialiased;}
  .auth-card{background:var(--card);border-radius:18px;width:100%;max-width:380px;padding:28px 24px 24px;box-shadow:0 16px 40px rgba(0,40,80,0.25);}
  .auth-logo{text-align:center;margin-bottom:18px;}
  .auth-logo img{max-width:160px;width:60%;}
  .page-title{font-family:'Baloo 2',sans-serif;font-size:18px;font-weight:700;text-align:center;margin-bottom:20px;}
  .field-group{margin-bottom:14px;}
  .field-label{display:block;font-size:12.5px;font-weight:600;color:var(--ink);margin-bottom:5px;}
  .field-input{width:100%;padding:11px 13px;border:1.5px solid var(--line);border-radius:9px;font-size:14px;font-family:'IBM Plex Sans Thai',sans-serif;background:#fff;color:var(--ink);transition:border-color .15s ease;}
  .field-input:focus{outline:none;border-color:var(--sky);}
  .field-with-toggle{position:relative;}
  .field-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;font-size:12.5px;color:var(--muted);user-select:none;background:none;border:none;font-family:'IBM Plex Sans Thai',sans-serif;padding:4px;}
  .strength-bar{height:4px;border-radius:2px;background:rgba(26,58,82,0.1);margin-top:6px;overflow:hidden;}
  .strength-bar-fill{height:100%;width:0%;border-radius:2px;transition:width .2s ease,background-color .2s ease;}
  .strength-label{font-size:11.5px;margin-top:4px;color:var(--muted);}
  .submit-btn{width:100%;padding:13px 0;background:linear-gradient(135deg,var(--navy) 0%,#0E4C7A 100%);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;font-family:'Baloo 2',sans-serif;cursor:pointer;margin-top:6px;transition:opacity .2s ease,transform .1s ease;}
  .submit-btn:active{transform:scale(0.98);}
  .submit-btn:disabled{opacity:0.55;cursor:not-allowed;}
  .form-alert{padding:10px 12px;border-radius:8px;font-size:13px;margin-bottom:14px;display:none;}
  .form-alert.show{display:block;}
  .form-alert.error{background:rgba(224,68,51,0.1);color:var(--danger);border:1px solid rgba(224,68,51,0.25);}
  .form-alert.success{background:rgba(63,133,87,0.1);color:var(--green-go);border:1px solid rgba(63,133,87,0.25);}
</style>
</head>
<body>
<div class="auth-card">
  <div class="auth-logo"><img id="siteLogo" src="../images/logo-main-service1.png" alt="Mayor Service"></div>
  <div class="page-title">ตั้งรหัสผ่านใหม่</div>
  <div class="form-alert" id="formAlert"></div>

  <div class="field-group">
    <label class="field-label">รหัสผ่านใหม่</label>
    <div class="field-with-toggle">
      <input type="password" class="field-input" id="newPassword" placeholder="••••••••">
      <button type="button" class="field-toggle" data-toggle-for="newPassword">แสดง</button>
    </div>
    <div class="strength-bar"><div class="strength-bar-fill" id="strengthBarFill"></div></div>
    <div class="strength-label" id="strengthLabel"></div>
  </div>
  <div class="field-group">
    <label class="field-label">ยืนยันรหัสผ่านใหม่</label>
    <div class="field-with-toggle">
      <input type="password" class="field-input" id="newPasswordConfirm" placeholder="••••••••">
      <button type="button" class="field-toggle" data-toggle-for="newPasswordConfirm">แสดง</button>
    </div>
  </div>
  <button class="submit-btn" id="submitBtn" disabled>บันทึกรหัสผ่านใหม่</button>
</div>

<script type="module">
import { auth, settings } from '../js/api.js';

settings.get().then(({ data }) => {
  if (data.logo_url) document.getElementById('siteLogo').src = data.logo_url;
}).catch(() => {});

const alertEl = document.getElementById('formAlert');
function showAlert(msg, type='error') { alertEl.textContent = msg; alertEl.className = `form-alert show ${type}`; }
function hideAlert() { alertEl.className = 'form-alert'; }

// ลิงก์จากอีเมลจะสร้าง session ชั่วคราวแบบ recovery ให้อัตโนมัติ (Supabase Auth จัดการให้)
// ถ้าไม่มี session แปลว่าลิงก์หมดอายุหรือเข้าหน้านี้ตรงๆ โดยไม่ผ่านอีเมล
auth.getSession().then(session => {
  if (!session) {
    showAlert('ลิงก์นี้หมดอายุหรือไม่ถูกต้อง กรุณาขอลิงก์ใหม่');
    document.getElementById('submitBtn').disabled = true;
    document.querySelectorAll('.field-input').forEach(el => el.disabled = true);
  }
});

document.querySelectorAll('.field-toggle').forEach(btn => {
  btn.addEventListener('click', () => {
    const input = document.getElementById(btn.dataset.toggleFor);
    const isHidden = input.type === 'password';
    input.type = isHidden ? 'text' : 'password';
    btn.textContent = isHidden ? 'ซ่อน' : 'แสดง';
  });
});

function checkPasswordStrength(pw) {
  if (!pw) return { score: 0, label: '', color: 'transparent' };
  const isAllSameChar = /^(.)\1+$/.test(pw);
  const isSequential  = /^(0123456789|1234567890|abcdefgh|password|12345678)/i.test(pw);
  const hasLower = /[a-z]/.test(pw);
  const hasUpper = /[A-Z]/.test(pw);
  const hasDigit = /[0-9]/.test(pw);
  const hasSymbol = /[^a-zA-Z0-9]/.test(pw);
  const variety = [hasLower, hasUpper, hasDigit, hasSymbol].filter(Boolean).length;

  if (pw.length < 8 || isAllSameChar || isSequential) {
    return { score: 1, label: 'รหัสผ่านอ่อนเกินไป', color: 'var(--danger)' };
  }
  if (variety <= 2) {
    return { score: 2, label: 'พอใช้ — ลองเพิ่มตัวเลขหรือสัญลักษณ์', color: 'var(--gold)' };
  }
  return { score: 3, label: 'รหัสผ่านแข็งแรงดี', color: 'var(--green-go)' };
}

function updateState() {
  const password = document.getElementById('newPassword').value;
  const confirm   = document.getElementById('newPasswordConfirm').value;
  const strength  = checkPasswordStrength(password);

  const fill  = document.getElementById('strengthBarFill');
  const label = document.getElementById('strengthLabel');
  fill.style.width = `${(strength.score / 3) * 100}%`;
  fill.style.backgroundColor = strength.color;
  label.textContent = strength.label;
  label.style.color = strength.color === 'transparent' ? 'var(--muted)' : strength.color;

  document.getElementById('submitBtn').disabled =
    !(strength.score >= 2 && password === confirm && confirm.length > 0);
}

['newPassword', 'newPasswordConfirm'].forEach(id => {
  document.getElementById(id).addEventListener('input', updateState);
});

document.getElementById('submitBtn').addEventListener('click', async () => {
  hideAlert();
  const password = document.getElementById('newPassword').value;
  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = 'กำลังบันทึก...';
  try {
    await auth.updatePassword(password);
    showAlert('ตั้งรหัสผ่านใหม่สำเร็จ กำลังพาไปเข้าสู่ระบบ...', 'success');
    setTimeout(() => { window.location.href = '/pages/login.html'; }, 1500);
  } catch (e) {
    showAlert(e.message);
    btn.disabled = false; btn.textContent = 'บันทึกรหัสผ่านใหม่';
  }
});
</script>
</body>
</html>
