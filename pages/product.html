<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>รายละเอียดสินค้า</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

  :root{
    --navy:#1A6BA0; --sky:#2196C9; --gold:#D9A330; --gold-deep:#B9821F;
    --ink:#1A3A52; --line:rgba(26,106,160,0.18); --muted:rgba(26,58,82,0.55);
    --green-go:#3F8557; --danger:#E04433;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ background:#81CFF0; }

  body{
    font-family:'IBM Plex Sans Thai', sans-serif;
    color:var(--ink);
    min-height:100vh;
    padding:14px 14px 30px;
    -webkit-font-smoothing:antialiased;
  }

  .back-link{
    display:inline-flex; align-items:center; gap:5px;
    margin-bottom:12px; color:#fff; font-size:13px; font-weight:600;
    text-decoration:none;
  }

  .product-detail-card{
    background:rgba(255,255,255,0.97);
    border-radius:16px;
    overflow:hidden;
    box-shadow:0 10px 28px rgba(0,40,80,0.2);
  }

  .product-img-wrap{
    width:100%; aspect-ratio:1.2;
    background:linear-gradient(135deg, #E8F2FA, #D4E9F7);
    position:relative;
  }
  .product-img-wrap img{ width:100%; height:100%; object-fit:cover; }
  .stock-badge-overlay{
    position:absolute; top:12px; right:12px;
    font-size:11.5px; font-weight:700;
    padding:5px 12px; border-radius:14px;
  }
  .stock-badge-overlay.in-stock{ background:rgba(63,133,87,0.92); color:#fff; }
  .stock-badge-overlay.out-of-stock{ background:rgba(224,68,51,0.92); color:#fff; }

  .pd-body{ padding:18px 18px 20px; }

  .pd-category{
    display:inline-block;
    font-size:11px; font-weight:700; color:var(--navy);
    background:rgba(26,106,160,0.1);
    padding:3px 10px; border-radius:8px;
    margin-bottom:8px;
  }

  .pd-name{ font-size:19px; font-weight:700; margin-bottom:6px; line-height:1.3; }
  .pd-rating{ font-size:14px; color:var(--gold-deep); margin-bottom:12px; letter-spacing:1px; }

  .pd-price-row{
    display:flex; align-items:baseline; gap:6px;
    margin-bottom:4px;
  }
  .pd-price{
    font-family:'Baloo 2', sans-serif;
    font-weight:800; color:var(--gold);
    font-size:28px;
  }
  .pd-unit{ font-size:13px; color:var(--muted); }

  .pd-stock-line{
    font-size:13px; color:var(--muted);
    margin-bottom:16px;
  }
  .pd-stock-line.zero{ color:var(--danger); font-weight:600; }

  .pd-section{ margin-bottom:18px; }
  .pd-section-title{
    font-size:13.5px; font-weight:700;
    margin-bottom:8px;
    display:flex; align-items:center; gap:6px;
  }
  .pd-desc{
    font-size:13.5px; line-height:1.7;
    color:rgba(26,58,82,0.85);
    white-space:pre-line; /* รองรับข้อความยาวพร้อม line break */
  }

  .attr-list{ display:flex; flex-direction:column; gap:8px; }
  .attr-row{
    display:flex; justify-content:space-between;
    padding:9px 12px;
    background:rgba(26,106,160,0.05);
    border-radius:9px;
    font-size:13px;
  }
  .attr-key{ color:var(--muted); font-weight:600; }
  .attr-val{ color:var(--ink); font-weight:600; }

  .note-box{
    background:rgba(217,163,48,0.08);
    border:1px solid rgba(217,163,48,0.25);
    border-radius:10px;
    padding:11px 13px;
    font-size:12.5px;
    line-height:1.6;
    color:var(--gold-deep);
  }

  .pd-action-area{ margin-top:6px; }
  .buy-btn{
    width:100%; padding:14px 0;
    background:linear-gradient(135deg, var(--navy) 0%, #0E4C7A 100%);
    color:#fff; border:none; border-radius:11px;
    font-size:15.5px; font-weight:700;
    font-family:'Baloo 2', sans-serif;
    cursor:pointer;
  }
  .out-of-stock-btn{
    width:100%; padding:14px 0;
    background:rgba(224,68,51,0.1);
    color:var(--danger); border:1.5px dashed var(--danger);
    border-radius:11px;
    font-size:14.5px; font-weight:700;
    font-family:'Baloo 2', sans-serif;
    text-align:center;
  }

  .skeleton{
    text-align:center; padding:60px 20px;
    color:rgba(255,255,255,0.8); font-size:14px;
  }

  @media (max-width: 480px){
    .pd-price{ font-size: 22px; }
    .pd-name { font-size: 17px; }
    .buy-btn  { font-size: 14px; }
    .back-link{ font-size: 12px; }
  }
</style>
</head>
<body>

<a href="/pages/shop.html" class="back-link">← กลับหน้าสินค้า</a>

<div id="detailWrap">
  <div class="skeleton">กำลังโหลด...</div>
</div>

<script type="module">
import { shop } from '../js/core/api.js';

const params = new URLSearchParams(window.location.search);
const productId = params.get('id');
const wrapEl = document.getElementById('detailWrap');

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str ?? '';
  return div.innerHTML;
}

function renderStars(rating) {
  const full = Math.round(rating);
  return '★'.repeat(full) + '☆'.repeat(5 - full);
}

// metadata jsonb อาจมี key ไหนก็ได้ในอนาคต — แสดงทุกค่าแบบ generic
// ไม่ hardcode key เพื่อรองรับสินค้าประเภทใหม่ได้โดยไม่แก้หน้านี้
const ATTR_LABELS = {
  server_type: 'ประเภทเซิร์ฟเวอร์',
  platform: 'รองรับแพลตฟอร์ม',
  warranty_days: 'ระยะเวลารับประกัน (วัน)'
};

function renderAttributes(metadata) {
  if (!metadata || Object.keys(metadata).length === 0) return '';

  const rows = Object.entries(metadata).map(([key, val]) => {
    const label = ATTR_LABELS[key] || key; // ถ้าไม่มี label ที่กำหนดไว้ ใช้ key ตรงๆ
    return `
      <div class="attr-row">
        <span class="attr-key">${escapeHtml(label)}</span>
        <span class="attr-val">${escapeHtml(String(val))}</span>
      </div>
    `;
  }).join('');

  return `
    <div class="pd-section">
      <div class="pd-section-title">คุณสมบัติสินค้า</div>
      <div class="attr-list">${rows}</div>
    </div>
  `;
}

async function render() {
  if (!productId) {
    wrapEl.innerHTML = `<div class="skeleton">ไม่พบสินค้าที่ระบุ</div>`;
    return;
  }

  const result = await shop.getProduct(productId);

  if (!result.success || !result.data) {
    wrapEl.innerHTML = `<div class="skeleton">ไม่พบสินค้านี้ หรือสินค้าถูกปิดการขาย</div>`;
    return;
  }

  const p = result.data;
  const inStock = p.stock_count > 0;

  const stockBadge = inStock
    ? `<span class="stock-badge-overlay in-stock">พร้อมขาย</span>`
    : `<span class="stock-badge-overlay out-of-stock">สินค้าหมด</span>`;

  const stockLine = inStock
    ? `<div class="pd-stock-line">เหลือ ${p.stock_count} ${p.unit} ในคลัง</div>`
    : `<div class="pd-stock-line zero">สินค้าหมด — รอเติมสต็อกรอบถัดไป</div>`;

  // ปุ่มซื้อ: แสดงเฉพาะมีสต็อก ตามข้อกำหนด Phase 2
  // ไม่ผูก logic การซื้อจริง — รอ Phase 3 (Checkout)
  const actionArea = inStock
    ? `<button class="buy-btn" id="buyBtn">ซื้อสินค้า</button>`
    : `<div class="out-of-stock-btn">สินค้าหมด</div>`;

  // หมายเหตุ: ดึงจาก metadata.note ถ้ามี — ไม่บังคับต้องมี
  const noteBox = p.metadata?.note
    ? `<div class="pd-section">
         <div class="pd-section-title">⚠️ หมายเหตุ</div>
         <div class="note-box">${escapeHtml(p.metadata.note)}</div>
       </div>`
    : '';

  wrapEl.innerHTML = `
    <div class="product-detail-card">
      <div class="product-img-wrap">
        <img src="${p.image_url ? escapeHtml(p.image_url) : '../images/placeholder.png'}" alt="${escapeHtml(p.name)}"
             loading="lazy" onerror="this.style.display='none'">
        ${stockBadge}
      </div>

      <div class="pd-body">
        ${p.product_categories?.name
          ? `<div class="pd-category">${escapeHtml(p.product_categories.name)}</div>`
          : ''}

        <div class="pd-name">${escapeHtml(p.name)}</div>
        <div class="pd-rating">${renderStars(p.rating)} <span style="color:var(--muted);font-size:12px;">(${p.rating})</span></div>

        <div class="pd-price-row">
          <span class="pd-price">฿${Number(p.price).toLocaleString()}</span>
          <span class="pd-unit">/ ${escapeHtml(p.unit)}</span>
        </div>
        ${stockLine}

        <div class="pd-section">
          <div class="pd-section-title">รายละเอียดสินค้า</div>
          <div class="pd-desc">${escapeHtml(p.description || 'ไม่มีคำอธิบายเพิ่มเติม')}</div>
        </div>

        ${renderAttributes(p.metadata)}
        ${noteBox}

        <div class="pd-action-area">
          ${actionArea}
        </div>
      </div>
    </div>
  `;

  // ปุ่มซื้อยังไม่ผูก logic จริงตามขอบเขต Phase 2
  // (ห้าม Checkout/ชำระเงิน — รอ Phase 3)
  // ปุ่มซื้อ → ไปหน้า checkout พร้อม product id
  // ตรวจ login ก่อน — ถ้ายังไม่ login ให้ไป login ก่อนแล้วค่อยกลับมาซื้อ
  document.getElementById('buyBtn')?.addEventListener('click', () => {
    window.location.href = `/pages/checkout.html?product_id=${productId}`;
  });
}

render();
</script>

</body>
</html>
