<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เข้าสู่ระบบ — Mayor Service</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Sarabun',sans-serif;min-height:100vh;background:#0f1923;display:flex;align-items:center;justify-content:center;padding:16px}
  .card{background:#1a2a3a;border-radius:16px;padding:32px 24px;width:100%;max-width:400px;box-shadow:0 8px 32px rgba(0,0,0,.4)}
  .logo{text-align:center;margin-bottom:28px}
  .logo h1{color:#fff;font-size:22px;font-weight:700;letter-spacing:1px}
  .logo span{color:#f59e0b;font-size:12px}
  .tabs{display:flex;background:#0f1923;border-radius:10px;padding:4px;margin-bottom:24px}
  .tab{flex:1;padding:10px;text-align:center;border-radius:8px;cursor:pointer;color:#6b7280;font-size:14px;transition:.2s}
  .tab.active{background:#1d4ed8;color:#fff}
  label{display:block;color:#9ca3af;font-size:13px;margin-bottom:6px;margin-top:16px}
  input{width:100%;padding:12px 14px;background:#0f1923;border:1.5px solid #374151;border-radius:10px;color:#fff;font-size:15px;outline:none;transition:.2s}
  input:focus{border-color:#1d4ed8}
  .btn{width:100%;padding:14px;background:#1d4ed8;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;margin-top:24px;transition:.2s}
  .btn:hover{background:#1e40af}
  .btn:disabled{background:#374151;cursor:not-allowed}
  .msg{margin-top:12px;padding:10px 14px;border-radius:8px;font-size:13px;text-align:center;display:none}
  .msg.error{background:#450a0a;color:#fca5a5;display:block}
  .msg.success{background:#052e16;color:#86efac;display:block}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>MAYOR SERVICE</h1>
    <span>SimCity BuildIt ID Shop</span>
  </div>
  <div class="tabs">
    <div class="tab active" id="tabLogin" onclick="switchTab('login')">เข้าสู่ระบบ</div>
    <div class="tab" id="tabRegister" onclick="switchTab('register')">สมัครสมาชิก</div>
  </div>

  <!-- Login -->
  <div id="formLogin">
    <label>อีเมล</label>
    <input type="email" id="loginEmail" placeholder="example@email.com">
    <label>รหัสผ่าน</label>
    <input type="password" id="loginPass" placeholder="••••••••">
    <button class="btn" id="btnLogin" onclick="doLogin()">เข้าสู่ระบบ</button>
  </div>

  <!-- Register -->
  <div id="formRegister" style="display:none">
    <label>ชื่อที่แสดง</label>
    <input type="text" id="regName" placeholder="ชื่อของคุณ">
    <label>อีเมล</label>
    <input type="email" id="regEmail" placeholder="example@email.com">
    <label>รหัสผ่าน</label>
    <input type="password" id="regPass" placeholder="อย่างน้อย 6 ตัวอักษร">
    <button class="btn" id="btnRegister" onclick="doRegister()">สมัครสมาชิก</button>
  </div>

  <div class="msg" id="msg"></div>
</div>

<script type="module">
import { login, register, getSession, isAdmin } from '../js/core/auth.js';

// ถ้า login อยู่แล้วให้ redirect
getSession().then(async s => {
  if (!s) return;
  const admin = await isAdmin();
  window.location.href = admin ? '/pages/admin/orders.html' : '/pages/shop.html';
});

window.switchTab = (tab) => {
  document.getElementById('formLogin').style.display    = tab === 'login'    ? '' : 'none';
  document.getElementById('formRegister').style.display = tab === 'register' ? '' : 'none';
  document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
  document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
  document.getElementById('msg').className = 'msg';
};

function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg ' + type;
}

function setLoading(btnId, loading) {
  document.getElementById(btnId).disabled = loading;
  document.getElementById(btnId).textContent = loading ? 'กำลังโหลด...' : (btnId === 'btnLogin' ? 'เข้าสู่ระบบ' : 'สมัครสมาชิก');
}

window.doLogin = async () => {
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPass').value;
  if (!email || !pass) return showMsg('กรุณากรอกข้อมูลให้ครบ', 'error');
  setLoading('btnLogin', true);
  const res = await login(email, pass);
  if (!res.success) { showMsg(res.error, 'error'); setLoading('btnLogin', false); return; }
  const admin = await isAdmin();
  window.location.href = admin ? '/pages/admin/orders.html' : '/pages/shop.html';
};

window.doRegister = async () => {
  const name  = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const pass  = document.getElementById('regPass').value;
  if (!name || !email || !pass) return showMsg('กรุณากรอกข้อมูลให้ครบ', 'error');
  if (pass.length < 6) return showMsg('รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร', 'error');
  setLoading('btnRegister', true);
  const res = await register(email, pass, name);
  if (!res.success) { showMsg(res.error, 'error'); setLoading('btnRegister', false); return; }
  showMsg('สมัครสมาชิกสำเร็จ! กรุณาเข้าสู่ระบบ', 'success');
  setLoading('btnRegister', false);
  setTimeout(() => switchTab('login'), 1500);
};
</script>
</body>
</html>
